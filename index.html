<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>심사 점검표</title>
<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon-192.png">
<script src="xlsx.full.min.js"></script>
<script src="audit-rules.js"></script>
<script src="audit-store.js"></script>
<script src="checklist-source.js"></script>
<script src="supabase-client.js"></script>
<script src="supabase-auth.js"></script>
<script src="registrants.js"></script>
<style>
@font-face {
  font-family: "Pretendard";
  src: url("./fonts/PretendardVariable.woff2") format("woff2");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
:root {
  /* Linear-inspired light field workspace tokens */
  --ads-text: #202124;
  --ads-text-subtle: #4B4F58;
  --ads-text-subtlest: #6B707A;
  --ads-text-inverse: #FFFFFF;
  --ads-link: #4C58BE;
  --ads-surface: #FFFFFF;
  --ads-surface-sunken: #F7F8F9;
  --ads-surface-container: #F5F6F6;
  --ads-surface-container-hovered: #E9EBEF;
  --ads-surface-overlay: #FFFFFF;
  --ads-border: #D9DCE2;
  --ads-border-bold: #B1B5BE;
  --ads-border-input: #9CA1AC;
  --ads-border-focused: #5E6AD2;
  --ads-brand: #5E6AD2;
  --ads-brand-hovered: #4C58BE;
  --ads-brand-pressed: #5E69D1;
  --ads-danger: #C9372C;
  --ads-danger-bg: #FFECEB;
  --ads-danger-text: #AE2E24;
  --ads-warning-bg: #FFF7D6;
  --ads-warning-bold: #D9A214;
  --ads-warning-text: #7F5F01;
  --ads-success-bg: #E8FAEF;
  --ads-success-bold: #27A644;
  --ads-success-text: #176B32;
  --ads-information-bg: #EEF0FF;
  --ads-information-bold: #5E6AD2;
  --ads-information-text: #3E499F;
  --ads-neutral-bg: #F1F2F4;
  --ads-neutral-bold: #62666D;
  --ads-neutral-text: #4B4F58;

  --font-family-ui: "Pretendard", "Pretendard Variable", sans-serif;
  --ads-font-heading: var(--font-family-ui);
  --ads-font-body: var(--font-family-ui);

  /* 모바일·태블릿 현장 점검용 타이포그래피 */
  --font-kpi-size: 1.5rem;                /* 24px */
  --font-kpi-line: 1.75rem;               /* 28px */
  --font-page-title-size: 1.25rem;         /* 20px */
  --font-page-title-line: 1.75rem;         /* 28px */
  --font-section-title-size: 1rem;         /* 16px */
  --font-section-title-line: 1.375rem;     /* 22px */
  --font-check-question-size: 1rem;        /* 16px */
  --font-check-question-line: 1.5rem;      /* 24px */
  --font-body-size: 1rem;                  /* 16px */
  --font-body-line: 1.5rem;                /* 24px */
  --font-control-size: 0.875rem;           /* 14px */
  --font-control-line: 1.2;                /* 16.8px */
  --font-input-size: 1rem;                 /* 16px */
  --font-input-line: 1.5;                  /* 24px */
  --font-result-size: 0.875rem;            /* 14px */
  --font-result-line: 1.2;                 /* 16.8px */
  --font-helper-size: 0.8125rem;           /* 13px */
  --font-helper-line: 1.5;                 /* 19.5px */
  --font-caption-size: 0.75rem;            /* 12px */
  --font-caption-line: 1.4;                /* 16.8px */

  /* 기존 ADS 참조를 유지하는 호환 별칭 */
  --ads-heading-large-size: var(--font-kpi-size);
  --ads-heading-large-line: var(--font-kpi-line);
  --ads-heading-medium-size: var(--font-page-title-size);
  --ads-heading-medium-line: var(--font-page-title-line);
  --ads-heading-small-size: var(--font-section-title-size);
  --ads-heading-small-line: var(--font-section-title-line);
  --ads-body-size: var(--font-body-size);
  --ads-body-line: var(--font-body-line);
  --ads-body-small-size: var(--font-helper-size);
  --ads-body-small-line: var(--font-helper-line);
  --ads-weight-regular: 400;
  --ads-weight-medium: 500;
  --ads-weight-semibold: 600;
  --ads-weight-bold: 600;

  --space-0: 0rem;
  --space-025: 0.125rem;
  --space-050: 0.25rem;
  --space-075: 0.375rem;
  --space-100: 0.5rem;
  --space-150: 0.75rem;
  --space-200: 1rem;
  --space-250: 1.25rem;
  --space-300: 1.5rem;
  --space-400: 2rem;
  --space-500: 2.5rem;
  --space-600: 3rem;
  --space-800: 4rem;

  --radius-xsmall: 0.125rem;
  --radius-small: 0.375rem;
  --radius-medium: 0.5rem;
  --radius-large: 0.75rem;
  --radius-xlarge: 1rem;
  --radius-xxlarge: 1.5rem;
  --radius-full: 9999px;

  --shadow-raised: none;
  --shadow-overlay: 0 16px 40px rgba(0, 0, 0, 0.45);
  --shadow-overflow: none;

  --ui-button-height: 2.25rem;
  --ui-button-small-height: 2.25rem;
  --ui-button-padding-inline: 0.875rem;
  --ui-button-small-padding-inline: 0.875rem;
  --ui-chip-height: 2rem;
  --ui-chip-padding-inline: var(--space-150);
  --ui-lozenge-height: 1.25rem;
  --ui-lozenge-padding-inline: var(--space-050);
  --ui-field-height: 2.5rem;
  --ui-tabbar-height: 4rem;
  --ui-topbar-height: 3.5rem;
  --ui-progress-height: 0.25rem;
  --ui-photo-size: 4.5rem;
  --touch-target-min: 2.75rem;
  --touch-target-hit-slop: 0.25rem;
  --mobile-action-height: 3.5rem;
  --mobile-card-padding: var(--space-200);
  --mobile-page-padding: var(--space-200);
  --card-stack-gap: var(--space-200);
  --mobile-bottom-safe-area: env(safe-area-inset-bottom);
  --ui-border-width: 0.0625rem;
  --ui-border-width-strong: 0.125rem;

  /* semantic aliases retained for existing JS/style references */
  --navy: var(--ads-surface-sunken);
  --navy2: var(--ads-surface);
  --navy3: var(--ads-surface-container);
  --blue: var(--ads-brand);
  --blue2: var(--ads-border-focused);
  --teal: var(--ads-brand);
  --teal2: var(--ads-information-text);
  --warn: var(--ads-warning-text);
  --danger: var(--ads-danger-text);
  --ok: var(--ads-success-text);
  --text: var(--ads-text);
  --text2: var(--ads-text-subtle);
  --text3: var(--ads-text-subtlest);
  --border: var(--ads-border);
  --border2: var(--ads-border-bold);
  --card: var(--ads-surface);
  --input: var(--ads-surface);
  --radius: var(--radius-large);
  --r2: var(--radius-medium);
}

* { box-sizing: border-box; margin: var(--space-0); padding: var(--space-0); -webkit-tap-highlight-color: transparent; }
html { height: 100%; font-size: 100%; color-scheme: light; }
body { height: 100%; background: var(--ads-surface-sunken); color: var(--ads-text); font-family: var(--font-family-ui); font-size: var(--ads-body-size); line-height: var(--ads-body-line); overflow: hidden; }
button, input, select, textarea, table { font-family: var(--font-family-ui); font-size: inherit; line-height: inherit; }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .audit-item:focus-visible, .check-head:focus-visible, .photo-add:focus-visible { outline: var(--ui-border-width-strong) solid var(--ads-border-focused); outline-offset: var(--space-025); }

/* Layout */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#topbar { background: var(--ads-surface); border-bottom: var(--ui-border-width) solid var(--ads-border); padding: env(safe-area-inset-top, 0) var(--space-0) var(--space-0); flex-shrink: 0; z-index: 100; }
#topbar-inner { display: flex; align-items: center; gap: var(--space-150); padding: var(--space-150) var(--mobile-page-padding); min-height: var(--ui-topbar-height); }
#topbar h1 { font-size: var(--ads-heading-small-size); line-height: var(--ads-heading-small-line); font-weight: var(--ads-weight-semibold); flex: 1; letter-spacing: -0.01em; }
#topbar .tag { display: inline-flex; align-items: center; min-height: var(--ui-lozenge-height); padding-inline: var(--ui-lozenge-padding-inline); border-radius: var(--radius-small); background: var(--ads-information-bg); color: var(--ads-information-text); font-size: var(--font-caption-size); line-height: var(--font-caption-line); font-weight: var(--ads-weight-regular); letter-spacing: 0.02em; }
.desktop-nav { display: none; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom, 0); }
#tabbar { background: var(--ads-surface); border-top: var(--ui-border-width) solid var(--ads-border); display: flex; padding: var(--space-100) var(--space-0) calc(var(--space-100) + env(safe-area-inset-bottom, 0)); flex-shrink: 0; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-025); min-height: var(--ui-tabbar-height); border: 0; background: transparent; color: var(--ads-text-subtlest); font-size: var(--font-control-size); line-height: var(--font-control-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, color 150ms ease; }
.tab-btn:hover { background: var(--ads-surface-container); color: var(--ads-text); }
.tab-btn.active { color: var(--ads-brand); }
.tab-btn svg { width: var(--space-300); height: var(--space-300); }

/* Sections & surfaces */
.section-header { padding: var(--space-200) var(--mobile-page-padding) var(--space-100); font-size: var(--font-section-title-size); line-height: var(--font-section-title-line); font-weight: var(--ads-weight-semibold); letter-spacing: -0.01em; color: var(--ads-text-subtle); }
.card, .check-card, .audit-item, .stat-card { background: var(--ads-surface); border: var(--ui-border-width) solid var(--ads-border); border-radius: var(--radius-large); overflow: hidden; }
.card { margin: var(--space-0) var(--mobile-page-padding) var(--card-stack-gap); }
.card-row { display: flex; align-items: center; padding: var(--space-200); gap: var(--space-150); border-bottom: var(--ui-border-width) solid var(--ads-border); }
.card-row:last-child { border-bottom: 0; }
.card-row .label { flex: 1; font-size: var(--ads-body-size); line-height: var(--ads-body-line); color: var(--ads-text); }
.card-row .sub { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtle); margin-top: var(--space-025); }

/* Buttons */
.btn { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: var(--space-075); min-height: var(--ui-button-height); padding-block: var(--space-100); padding-inline: var(--ui-button-padding-inline); border: var(--ui-border-width) solid transparent; border-radius: var(--radius-medium); background: var(--ads-surface-container); color: var(--ads-text); font-size: var(--font-control-size); line-height: var(--font-control-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, border-color 150ms ease, transform 100ms ease; -webkit-user-select: none; user-select: none; }
.btn::before, .ans-btn::before, .field-choice::before, .anchor-chip::before { content: ""; position: absolute; inset: calc(-1 * var(--touch-target-hit-slop)); }
.btn:hover { background: var(--ads-surface-container-hovered); }
.btn:active { transform: scale(0.98); }
.btn-primary, .btn-teal { background: var(--ads-brand); border-color: var(--ads-brand); color: var(--ads-text-inverse); }
.btn-primary:hover, .btn-teal:hover { background: var(--ads-brand-hovered); border-color: var(--ads-brand-hovered); }
.btn-primary:active, .btn-teal:active { background: var(--ads-brand-pressed); border-color: var(--ads-brand-pressed); }
.btn-ghost { background: var(--ads-surface); border-color: var(--ads-border-bold); color: var(--ads-text); }
.btn-danger { background: var(--ads-danger); border-color: var(--ads-danger); color: var(--ads-text-inverse); }
.btn-sm { min-height: var(--ui-button-small-height); padding-inline: var(--ui-button-small-padding-inline); font-size: var(--font-control-size); line-height: var(--font-control-line); }
.btn-full { width: 100%; border-radius: var(--radius-large); }

/* Form controls */
input[type=text], input[type=date], input[type=number], textarea, select { background: var(--ads-surface); border: var(--ui-border-width) solid var(--ads-border-input); border-radius: var(--radius-medium); color: var(--ads-text); font-size: var(--font-input-size); line-height: var(--font-input-line); min-height: var(--ui-field-height); padding: var(--space-100) var(--space-150); width: 100%; outline: none; transition: border-color 150ms ease, box-shadow 150ms ease; -webkit-appearance: none; }
input:focus, textarea:focus, select:focus { border-color: var(--ads-border-focused); box-shadow: 0 0 0 var(--ui-border-width) var(--ads-border-focused); }
textarea { resize: vertical; min-height: var(--space-800); }
select option { background: var(--ads-surface); color: var(--ads-text); }

/* Lozenge / Badge */
.badge, .lozenge, .dDay { display: inline-flex; align-items: center; justify-content: center; width: max-content; max-width: 100%; min-height: var(--ui-lozenge-height); padding-inline: var(--ui-lozenge-padding-inline); border-radius: var(--radius-full); font-size: var(--font-caption-size); line-height: var(--font-caption-line); font-weight: var(--ads-weight-regular); white-space: nowrap; border: var(--ui-border-width) solid transparent; }
.badge-ok { background: var(--ads-success-bg); color: var(--ads-success-text); border-color: var(--ads-success-bold); }
.badge-ng { background: var(--ads-danger-bg); color: var(--ads-danger-text); border-color: var(--ads-danger); }
.badge-na { background: var(--ads-neutral-bg); color: var(--ads-neutral-text); border-color: var(--ads-neutral-bold); }
.badge-obs { background: var(--ads-warning-bg); color: var(--ads-warning-text); border-color: var(--ads-warning-bold); }

/* Answer buttons */
.ans-row { display: flex; gap: var(--space-100); flex-wrap: wrap; }
.ans-btn { position: relative; flex: 1; min-width: var(--space-800); min-height: var(--ui-button-small-height); padding-block: var(--space-100); padding-inline: var(--ui-button-small-padding-inline); border: var(--ui-border-width) solid var(--ads-border-input); background: var(--ads-surface); color: var(--ads-text-subtle); border-radius: var(--radius-full); font-size: var(--font-result-size); line-height: var(--font-result-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease; text-align: center; }
.ans-btn:hover { background: var(--ads-surface-container); }
.ans-btn.sel-ok { background: var(--ads-success-bg); border-color: var(--ads-success-bold); color: var(--ads-success-text); }
.ans-btn.sel-ng { background: var(--ads-danger-bg); border-color: var(--ads-danger); color: var(--ads-danger-text); }
.ans-btn.sel-na { background: var(--ads-neutral-bg); border-color: var(--ads-neutral-bold); color: var(--ads-neutral-text); }
.ans-btn.sel-obs { background: var(--ads-warning-bg); border-color: var(--ads-warning-bold); color: var(--ads-warning-text); }

/* Progress */
.prog-wrap { height: var(--ui-progress-height); background: var(--ads-surface-container); border-radius: var(--radius-full); overflow: hidden; margin: var(--space-0) var(--space-150) var(--space-050); }
.prog-fill { height: 100%; background: var(--ads-brand); border-radius: var(--radius-full); transition: width 300ms ease; }
.prog-label { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); padding: var(--space-0) var(--space-150) var(--space-150); display: flex; justify-content: space-between; }

/* Check item */
.check-card { margin: var(--space-0) var(--mobile-page-padding) var(--card-stack-gap); }
.check-card.answered { border-color: var(--ads-border-bold); }
.check-head { padding: var(--space-200) var(--space-200) var(--space-150); cursor: pointer; }
.check-num { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-brand); font-weight: var(--ads-weight-semibold); margin-bottom: var(--space-050); letter-spacing: 0.02em; }
.check-q { font-size: var(--font-check-question-size); line-height: var(--font-check-question-line); font-weight: var(--ads-weight-medium); color: var(--ads-text); }
.check-ref { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtle); margin-top: var(--space-050); }
.check-label { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtle); font-weight: var(--ads-weight-medium); margin-bottom: var(--space-075); margin-top: var(--space-150); }
.check-label:first-child { margin-top: var(--space-0); }

/* Photos */
.photo-row { display: flex; gap: var(--space-100); flex-wrap: wrap; margin-top: var(--space-050); }
.photo-thumb, .photo-add { width: var(--ui-photo-size); height: var(--ui-photo-size); border-radius: var(--radius-medium); }
.photo-thumb { object-fit: cover; border: var(--ui-border-width) solid var(--ads-border); cursor: pointer; }
.photo-add { border: var(--ui-border-width-strong) dashed var(--ads-border-bold); background: var(--ads-surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-050); cursor: pointer; color: var(--ads-text-subtlest); font-size: var(--font-control-size); line-height: var(--font-control-line); }
.photo-add:hover { background: var(--ads-surface-container); color: var(--ads-text); }
.photo-add svg { width: var(--space-300); height: var(--space-300); }
.photo-remove { position: absolute; top: calc(-1 * var(--space-075)); right: calc(-1 * var(--space-075)); width: var(--touch-target-min); height: var(--touch-target-min); padding: 0; border-radius: var(--radius-full); background: transparent; border: 0; color: transparent; cursor: pointer; display: flex; align-items: flex-start; justify-content: flex-end; }
.photo-remove::before { content: '✕'; width: 1.125rem; height: 1.125rem; border-radius: var(--radius-full); background: var(--ads-danger); color: var(--ads-text-inverse); font-size: var(--ads-body-small-size); line-height: 1.125rem; text-align: center; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(9, 30, 66, 0.54); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 200ms ease; }
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal-sheet { background: var(--ads-surface-overlay); border-radius: var(--radius-xxlarge) var(--radius-xxlarge) var(--space-0) var(--space-0); width: 100%; max-height: 90vh; overflow-y: auto; padding: var(--space-0) var(--space-0) env(safe-area-inset-bottom, var(--space-200)); transform: translateY(100%); transition: transform 250ms cubic-bezier(.4, 0, .2, 1); box-shadow: var(--shadow-overlay); }
.modal-backdrop.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: var(--space-400); height: var(--space-050); background: var(--ads-border-bold); border-radius: var(--radius-full); margin: var(--space-150) auto var(--space-200); }
.modal-title { font-size: var(--ads-heading-small-size); line-height: var(--ads-heading-small-line); font-weight: var(--ads-weight-semibold); padding: var(--space-0) var(--space-250) var(--space-200); border-bottom: var(--ui-border-width) solid var(--ads-border); color: var(--ads-text); }
.modal-body { padding: var(--space-200) var(--space-250); }
.modal-actions { position: sticky; bottom: 0; display: flex; gap: var(--space-150); padding: var(--space-200) var(--space-250) calc(var(--space-200) + env(safe-area-inset-bottom, 0)); border-top: var(--ui-border-width) solid var(--ads-border); background: var(--ads-surface-overlay); }

/* Upload */
.upload-zone { border: var(--ui-border-width-strong) dashed var(--ads-border-bold); border-radius: var(--radius-large); padding: var(--space-500) var(--space-250); text-align: center; cursor: pointer; transition: border-color 200ms ease, background-color 200ms ease; margin: var(--space-0) var(--mobile-page-padding); background: var(--ads-surface); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--ads-border-focused); background: var(--ads-information-bg); }
.upload-zone svg { width: var(--space-500); height: var(--space-500); color: var(--ads-text-subtlest); margin-bottom: var(--space-150); }
.upload-zone h3 { font-size: var(--font-section-title-size); line-height: var(--font-section-title-line); font-weight: var(--ads-weight-semibold); margin-bottom: var(--space-075); }
.upload-zone p { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); column-gap: var(--space-100); row-gap: var(--card-stack-gap); padding: var(--space-0) var(--mobile-page-padding); }
.stat-card { padding: var(--space-200); text-align: center; }
.stat-val { font-size: var(--ads-heading-large-size); line-height: var(--ads-heading-large-line); font-weight: var(--ads-weight-bold); color: var(--ads-brand); }
.stat-lbl { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); margin-top: var(--space-050); }
.stat-ok .stat-val { color: var(--ads-success-text); }
.stat-ng .stat-val { color: var(--ads-danger-text); }
.stat-na .stat-val { color: var(--ads-neutral-text); }

/* Toast */

<script>
'use strict';
// ═══════════════════════════════════════════════
//  DB (IndexedDB via simple wrapper)
// ═══════════════════════════════════════════════
const DB_NAME = 'AuditApp', DB_VER = 2;
const UI_CLASS = Object.freeze({
  HIDDEN: 'hidden',
  OPEN: 'open',
  ACTIVE: 'active',
  ONLINE: 'is-online',
  OFFLINE: 'is-offline'
});
let db;

function byId(id){
  return document.getElementById(id);
}

function setHidden(elOrId, hidden = true){
  const el = typeof elOrId === 'string' ? byId(elOrId) : elOrId;
  if(!el) return;
  el.classList.toggle(UI_CLASS.HIDDEN, Boolean(hidden));
}

function setVisible(elOrId, visible = true){
  setHidden(elOrId, !visible);
}

function openDB(){
  return AuditStore.open(DB_NAME, DB_VER).then(database => { db = database; return database; });
}

function dbAll(store){
  return AuditStore.all(db, store);
}
function dbGet(store,id){
  return AuditStore.get(db, store, id);
}
function dbPut(store,obj){
  return AuditStore.put(db, store, obj);
}
function dbDelete(store,id){
  return AuditStore.delete(db, store, id);
}

function dbClear(store){
  return AuditStore.clear(db, store);
}

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let currentTab = 'home';
let currentAudit = null;
let checklistFilter = 'all';
let currentPhotoTarget = null; // {auditId, itemIndex}
let pendingPhotos = [];
let checklistSyncState = { checked: false, reachable: null, message: '점검표 서버 확인 전' };
let pendingInviteTokens = null;

// Debug logging is disabled by default in production.
// Add ?debug=1 to the URL when console diagnostics are needed.
const DEBUG_MODE = new URLSearchParams(location.search).get('debug') === '1';
function appLog(...args){ if(DEBUG_MODE) console.log(...args); }
function appWarn(...args){ if(DEBUG_MODE) console.warn(...args); }
function appError(...args){ if(DEBUG_MODE) console.error(...args); }

const AUDIT_STATUS = Object.freeze({
  PROGRESS: 'progress',
  DONE: 'done'
});

const RESULT_VALUE = Object.freeze({
  YES: 'YES',
  NO: 'NO',
  OBS: 'OBS',
  NA: 'N/A'
});

// 관리자 모드
// - 일반 사용자는 GitHub에서 동기화된 공식 점검표로 심사만 수행한다.
// - 관리자는 URL에 ?admin=1을 붙여 점검표 업로드/삭제 등 관리 기능을 표시한다.
const ADMIN_MODE_STORAGE_KEY = 'auditAppAdminMode';

function initAdminModeFromUrl(){
  const params = new URLSearchParams(location.search);
  if(params.get('admin') === '1') localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  if(params.get('admin') === '0') localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
}

function isAdminMode(){
  return localStorage.getItem(ADMIN_MODE_STORAGE_KEY) === '1';
}

function setAdminMode(enabled){
  if(enabled) localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  else localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
  showToast(enabled ? '관리자 모드가 켜졌습니다' : '관리자 모드가 꺼졌습니다');
  switchTab(currentTab);
}

// ═══════════════════════════════════════════════
//  Template compatibility / migration helpers
//  - 기존 기기에 저장된 과거 점검표 데이터를 삭제하지 않고 새 구조로 보정한다.
// ═══════════════════════════════════════════════
function normalizeChecklistItem(item){
  if(!item || typeof item !== 'object') return null;

  const question = String(
    item.question ?? item.title ?? item.name ?? item.item ?? item.checkItem ?? item['점검 질문'] ?? item['점검항목'] ?? ''
  ).trim();
  if(!question) return null;

  return {
    section: String(item.section ?? item.category ?? item.group ?? item['섹션명'] ?? item['섹션'] ?? '일반').trim() || '일반',
    ref: String(item.ref ?? item.no ?? item.number ?? item.code ?? item['항목번호'] ?? '').trim(),
    question,
    refStd: String(item.refStd ?? item.standard ?? item.reference ?? item.regulation ?? item['참조규정'] ?? '').trim(),
    externalRef: String(item.externalRef ?? item.external ?? item.externalReference ?? item['외부참조'] ?? item['External Ref.'] ?? '').trim(),
    conformityCriteria: String(item.conformityCriteria ?? item.conformity ?? item['Conformity Criteria'] ?? item['Conformity'] ?? item['성숙도 Conformity'] ?? '').trim(),
    establishedCriteria: String(item.establishedCriteria ?? item.established ?? item['Established Criteria'] ?? item['Established'] ?? item['성숙도 Established'] ?? '').trim(),
    matureCriteria: String(item.matureCriteria ?? item.mature ?? item['Mature Criteria'] ?? item['Mature'] ?? item['성숙도 Mature'] ?? '').trim(),
    leadingCriteria: String(item.leadingCriteria ?? item.leading ?? item['Leading Criteria'] ?? item['Leading'] ?? item['성숙도 Leading'] ?? '').trim(),
    type: String(item.type ?? item.answerType ?? item['점검유형'] ?? 'YES/NO/OBS/N/A').trim() || 'YES/NO/OBS/N/A',
    result: normalizeResultValue(item.result) || null,
    maturity: item.maturity ?? '',
    // wayfinder #8 — item-level maturityOn/maturityGuidance are authored per
    // item (e.g. a Supabase-registered template), unlike the other fields
    // above which are always inferred/defaulted from a raw spreadsheet row.
    maturityOn: item.maturityOn,
    maturityGuidance: Array.isArray(item.maturityGuidance) ? item.maturityGuidance : undefined,
    note: String(item.note ?? item.memo ?? item.comment ?? item['비고'] ?? ''),
    photos: Array.isArray(item.photos) ? item.photos : []
  };
}

function normalizeTemplate(template){
  const t = template && typeof template === 'object' ? template : {};
  let rawItems = [];

  if(Array.isArray(t.items)) rawItems = t.items;
  else if(Array.isArray(t.questions)) rawItems = t.questions;
  else if(Array.isArray(t.rows)) rawItems = t.rows;
  else if(Array.isArray(t.checklist)) rawItems = t.checklist;

  const items = rawItems.map(normalizeChecklistItem).filter(Boolean);
  const sectionSource = Array.isArray(t.sections) && t.sections.length
    ? t.sections
    : [...new Set(items.map(i => i.section || '일반'))];

  return {
    ...t,
    name: String(t.name || t.title || t.filename || '이름 없는 점검표').trim(),
    version: String(t.version || '').trim(),
    source: t.source || (t.filename ? 'preset' : 'manual'),
    active: t.active !== false,
    sha: String(t.sha || '').trim(),
    updatedAt: String(t.updatedAt || '').trim(),
    fingerprint: String(t.fingerprint || '').trim(),
    templateKey: t.templateKey || (t.filename && t.version ? `${t.filename}@@${t.version}` : ''),
    reportTemplate: inferReportTemplateType(t),
    checklistUiType: t.checklistUiType || getChecklistUiType(t),
    sections: sectionSource.map(s => String(s || '일반').trim()).filter(Boolean),
    items
  };
}

async function getNormalizedTemplates(){
  const templates = await dbAll('templates');
  return templates.map(normalizeTemplate);
}

async function getNormalizedTemplate(id){
  const template = await dbGet('templates', id);
  return template ? normalizeTemplate(template) : null;
}

async function repairStoredTemplates(){
  const templates = await dbAll('templates');
  let repaired = 0;

  for(const original of templates){
    const normalized = normalizeTemplate(original);
    const originalCount = Array.isArray(original?.items) ? original.items.length : 0;
    const needsRepair = !Array.isArray(original?.items)
      || originalCount !== normalized.items.length
      || !Array.isArray(original?.sections)
      || !original?.name;

    if(needsRepair && normalized.id && normalized.items.length){
      await dbPut('templates', normalized);
      repaired += 1;
    }
  }

  if(repaired > 0) appLog(`점검표 호환 보정 완료: ${repaired}건`);
  return repaired;
}

// ═══════════════════════════════════════════════
//  자동 점검표 동기화 (GitHub Contents API 폴더 스캔 기준)
//  - 관리자는 GitHub checklists 폴더에 Excel을 추가/교체한다.
//  - 앱은 GitHub Contents API로 checklists 폴더를 조회한다.
//  - .xlsx/.xls 파일만 자동 동기화한다.
//  - GitHub SHA를 기준으로 변경된 파일만 IndexedDB에 반영한다.
//  - 기존 심사 데이터는 수정하지 않고, 새 심사부터 최신 점검표를 사용한다.
// ═══════════════════════════════════════════════
const CHECKLIST_FOLDER_PATH = 'checklists';
const GITHUB_BRANCH = 'main';

function getGitHubRepoInfo(){
  const host = location.hostname;
  const pathParts = location.pathname.split('/').filter(Boolean);

  if(host.endsWith('.github.io') && pathParts.length > 0){
    return {
      owner: host.replace('.github.io', ''),
      repo: pathParts[0],
      branch: GITHUB_BRANCH
    };
  }

  // 로컬 테스트 또는 커스텀 도메인에서는 아래 값을 필요 시 직접 수정한다.
  return {
    owner: 'tt170019-bot',
    repo: 'audit-app',
    branch: GITHUB_BRANCH
  };
}

async function loadChecklistIndex(){
  const repo = getGitHubRepoInfo();

  try{
    const index = await ChecklistSource.loadGitHubIndex({...repo, folderPath:CHECKLIST_FOLDER_PATH});
    checklistSyncState = { checked: true, reachable: true, message: 'GitHub 점검표 서버 접근 가능' };
    return index;
  } catch(e){
    checklistSyncState = { checked: true, reachable: false, message: '온라인 상태와 별개로 GitHub 점검표 서버 접근 실패' };
    appWarn('GitHub checklists 폴더 조회 실패. 저장된 점검표를 계속 사용합니다.', e);
    return [];
  }
}

// wayfinder #8 — Supabase 익명 읽기. GitHub 자동 동기화와 나란히 동작하는
// 두 번째 점검표 소스: 로그인 없이 목록을 읽고, 실패해도 기존 저장분은 그대로 둔다.
let supabaseSyncState = { checked: false, reachable: null, message: 'Supabase 점검표 서버 확인 전' };

async function loadSupabaseChecklists(){
  try{
    const client = SupabaseClient.getClient();
    const templates = await ChecklistSource.loadSupabaseTemplates(client);
    supabaseSyncState = { checked: true, reachable: true, message: 'Supabase 점검표 서버 접근 가능' };
    return templates;
  } catch(e){
    supabaseSyncState = { checked: true, reachable: false, message: '온라인 상태와 별개로 Supabase 점검표 서버 접근 실패' };
    appWarn('Supabase templates 조회 실패. 저장된 점검표를 계속 사용합니다.', e);
    return [];
  }
}

// wayfinder #9 — Registrant 인증. 로그인 상태는 등록(체크리스트 쓰기)/등록자
// 관리 화면에서만 쓰인다 — 감사자의 익명 읽기/감사 진행 플로우는 이 모듈을
// 전혀 거치지 않는다.
function getRegistrantAuth(){
  return SupabaseAuth.getAuth(SupabaseClient.getClient());
}

function getRegistrantSession(){
  return getRegistrantAuth().getSession();
}

async function restoreRegistrantSession(){
  return getRegistrantAuth().restoreSession();
}

async function registrantSignIn(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  setVisible(errorEl, false);
  if(!email || !password){ setVisible(errorEl, true); errorEl.textContent = '이메일과 비밀번호를 입력하세요'; return; }

  try{
    await getRegistrantAuth().signIn(email, password);
    closeModal('modal-login');
    document.getElementById('login-password').value = '';
    showToast('로그인되었습니다');
    if(currentTab === 'templates'){ const c = document.getElementById('content'); if(c) renderTemplates(c); }
  }catch(e){
    setVisible(errorEl, true);
    errorEl.textContent = e.message || '로그인에 실패했습니다';
  }
}

async function registrantSignOut(){
  await getRegistrantAuth().signOut();
  showToast('로그아웃되었습니다');
  if(currentTab === 'templates'){ const c = document.getElementById('content'); if(c) renderTemplates(c); }
}

// ═══════════════════════════════════════════════
//  wayfinder #12 — 등록자 관리 (초대/목록/제거)
//  Admin API가 필요한 작업이라 registrants.js를 통해 Edge Function만 호출한다.
// ═══════════════════════════════════════════════
async function openRegistrantsModal(){
  const session = getRegistrantSession();
  if(!session?.user){ showToast('로그인이 필요합니다'); return; }
  openModal('modal-registrants');
  await renderRegistrantsModal();
}

async function renderRegistrantsModal(){
  const session = getRegistrantSession();
  const body = document.getElementById('registrants-body');
  if(!session?.user){ body.innerHTML = `<div class="sub text-danger">로그인이 필요합니다</div>`; return; }

  body.innerHTML = '불러오는 중입니다...';
  try{
    const users = await Registrants.getRegistrants(SupabaseClient.getClient()).list(session.accessToken);
    body.innerHTML = `
      <div class="check-label">새 등록자 초대</div>
      <input type="email" id="registrant-invite-email" placeholder="you@example.com">
      <button type="button" class="btn btn-teal btn-sm field-gap" onclick="inviteRegistrant()">초대</button>
      <div class="sub text-danger" id="registrant-error" style="display:none;"></div>
      <div class="section-header mt-150">현재 등록자 (${users.length})</div>
      ${users.map(u => `
      <div class="card-row">
        <div class="flex-1"><div class="label">${esc(u.email || u.id)}</div></div>
        ${u.id === session.user.id ? `<span class="sub">나</span>` : `<button type="button" class="btn btn-danger btn-sm" onclick="removeRegistrant('${u.id}')">제거</button>`}
      </div>`).join('')}
    `;
  }catch(e){
    body.innerHTML = `<div class="sub text-danger">등록자 목록을 불러오지 못했습니다: ${esc(e.message||'')}</div>`;
  }
}

async function inviteRegistrant(){
  const session = getRegistrantSession();
  if(!session?.user){ showToast('로그인이 필요합니다'); return; }
  const email = document.getElementById('registrant-invite-email').value.trim();
  const errorEl = document.getElementById('registrant-error');
  setVisible(errorEl, false);
  if(!email){ setVisible(errorEl, true); errorEl.textContent = '이메일을 입력하세요'; return; }

  try{
    await Registrants.getRegistrants(SupabaseClient.getClient()).invite(session.accessToken, email);
    showToast(`${email}님을 초대했습니다`);
    await renderRegistrantsModal();
  }catch(e){
    setVisible(errorEl, true);
    errorEl.textContent = e.message || '초대에 실패했습니다';
  }
}

async function removeRegistrant(userId){
  const session = getRegistrantSession();
  if(!session?.user){ showToast('로그인이 필요합니다'); return; }
  try{
    await Registrants.getRegistrants(SupabaseClient.getClient()).remove(session.accessToken, userId);
    showToast('등록자를 제거했습니다');
    await renderRegistrantsModal();
  }catch(e){
    showToast('제거에 실패했습니다: ' + (e.message || ''));
  }
}

// ═══════════════════════════════════════════════
//  초대/비밀번호 재설정 링크 수락
//  Supabase 초대·복구 메일 링크는 access_token을 URL 해시로 들고 돌아온다
//  (#access_token=...&type=invite). 이걸 감지해서 새 비밀번호를 설정하고
//  바로 로그인 상태로 전환한다 — 별도 로그인 단계 없이 즉시 사용 가능.
// ═══════════════════════════════════════════════
function parseAuthHashParams(){
  const hash = location.hash.startsWith('#') ? location.hash.slice(1) : '';
  if(!hash) return null;
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const type = params.get('type');
  if(!accessToken || (type !== 'invite' && type !== 'recovery')) return null;
  return {
    accessToken,
    refreshToken: params.get('refresh_token') || '',
    expiresIn: Number(params.get('expires_in') || '3600'),
    type
  };
}

function initInviteAcceptanceFromUrl(){
  const parsed = parseAuthHashParams();
  if(!parsed) return;
  pendingInviteTokens = parsed;
  history.replaceState(null, '', location.pathname + location.search);
  document.getElementById('accept-invite-title').textContent = parsed.type === 'recovery' ? '비밀번호 재설정' : '등록자 초대 수락';
  openModal('modal-accept-invite');
}

async function confirmAcceptInvite(){
  const password = document.getElementById('accept-invite-password').value;
  const password2 = document.getElementById('accept-invite-password2').value;
  const errorEl = document.getElementById('accept-invite-error');
  setVisible(errorEl, false);

  if(!password || password.length < 6){ setVisible(errorEl, true); errorEl.textContent = '비밀번호는 6자 이상이어야 합니다'; return; }
  if(password !== password2){ setVisible(errorEl, true); errorEl.textContent = '비밀번호가 일치하지 않습니다'; return; }
  if(!pendingInviteTokens){ setVisible(errorEl, true); errorEl.textContent = '초대 링크 정보를 찾을 수 없습니다. 링크를 다시 열어주세요'; return; }

  try{
    await getRegistrantAuth().acceptInvite(pendingInviteTokens.accessToken, pendingInviteTokens.refreshToken, pendingInviteTokens.expiresIn, password);
    pendingInviteTokens = null;
    closeModal('modal-accept-invite');
    showToast('등록자로 활성화되었습니다');
    switchTab('templates');
  }catch(e){
    setVisible(errorEl, true);
    errorEl.textContent = e.message || '처리에 실패했습니다. 링크가 만료되었을 수 있습니다';
  }
}

function getPresetTemplateKey(cl){
  return `${cl.filename}@@${cl.fingerprint || cl.sha || cl.updatedAt || 'unversioned'}`;
}

function getTemplateVersionLabel(template){
  if(template?.sha) return `SHA ${String(template.sha).slice(0, 7)}`;
  if(template?.updatedAt) return `수정 ${new Date(template.updatedAt).toLocaleDateString('ko-KR')}`;
  if(template?.version) return `v${template.version}`;
  if(template?.importedAt) return `등록 ${new Date(template.importedAt).toLocaleDateString('ko-KR')}`;
  return 'legacy';
}

function getTemplateSourceLabel(template){
  if((template?.source === 'github-api' || template?.source === 'github-index' || template?.source === 'supabase')) return '자동동기화';
  if(template?.source === 'preset') return '자동등록';
  return '수동등록';
}

function sortTemplatesForDisplay(templates){
  return [...templates].sort((a,b)=>{
    const activeA = a.active === false ? 1 : 0;
    const activeB = b.active === false ? 1 : 0;
    if(activeA !== activeB) return activeA - activeB;
    const ai = String(a.importedAt || '');
    const bi = String(b.importedAt || '');
    if(ai !== bi) return bi.localeCompare(ai);
    return String(a.name || '').localeCompare(String(b.name || ''), 'ko');
  });
}

function extractChecklistItemsFromRows(rows){
  const items = [];
  const sections = new Set();

  for(const row of ChecklistSource.extractRows(rows)){
    const normalized = normalizeChecklistItem(row);
    if(!normalized) continue;
    sections.add(normalized.section || '일반');
    items.push(normalized);
  }

  return { items, sections: [...sections] };
}

async function markSupersededTemplates(filename, keepTemplateKey, indexFilenames){
  const existing = await dbAll('templates');
  for(const t of existing){
    if(t.source !== 'github-api' && t.source !== 'github-index' && t.source !== 'preset') continue;
    if(filename && t.filename === filename && t.templateKey !== keepTemplateKey && t.active !== false){
      await dbPut('templates', {...t, active:false, supersededAt:new Date().toISOString()});
    }
    if(!filename && indexFilenames && t.filename && !indexFilenames.has(t.filename) && t.active !== false){
      await dbPut('templates', {...t, active:false, removedFromIndexAt:new Date().toISOString()});
    }
  }
}

async function autoLoadChecklists(){
  const index = await loadChecklistIndex();
  let added = 0;
  let updated = 0;

  if(index.length === 0){
    appLog('동기화할 GitHub 점검표가 없습니다. checklists 폴더를 확인하세요.');
  }

  const indexFilenames = new Set(index.map(cl => cl.filename));
  if(index.length > 0) await markSupersededTemplates(null, null, indexFilenames);

  for(const cl of index){
    const existing = await dbAll('templates');
    const templateKey = getPresetTemplateKey(cl);
    const sameVersion = existing.find(t => t.templateKey === templateKey || (t.filename === cl.filename && t.fingerprint === cl.fingerprint));
    if(sameVersion){
      if(sameVersion.active === false){
        await dbPut('templates', {...sameVersion, active:true, restoredAt:new Date().toISOString()});
      }
      continue;
    }

    try{
      const res = await fetch(`${cl.path}?sha=${encodeURIComponent(cl.fingerprint)}&ts=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) throw new Error(`${cl.path} HTTP ${res.status}`);

      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const parsed = extractChecklistItemsFromRows(rows);
      if(parsed.items.length===0) throw new Error('점검 항목을 찾을 수 없습니다. Excel 컬럼 형식을 확인하세요.');

      await markSupersededTemplates(cl.filename, templateKey, null);
      await dbPut('templates', {
        name: cl.name,
        filename: cl.filename,
        sha: cl.sha || '',
        updatedAt: cl.updatedAt || '',
        fingerprint: cl.fingerprint,
        templateKey,
        source: 'github-api',
        reportTemplate: inferReportTemplateType(cl),
        checklistUiType: getChecklistUiType(cl),
        active: true,
        importedAt: new Date().toISOString(),
        sections: parsed.sections,
        items: parsed.items
      });
      added += 1;
      updated += existing.some(t => t.filename === cl.filename) ? 1 : 0;
      appLog(`점검표 동기화: ${cl.name} ${cl.sha ? cl.sha.slice(0, 7) : cl.updatedAt || ''}`);
    } catch(e){
      appWarn(`점검표 동기화 실패: ${cl.filename}`, e);
    }
  }

  const supabaseTemplates = await loadSupabaseChecklists();
  for(const tpl of supabaseTemplates){
    const existing = await dbAll('templates');
    const sameVersion = existing.find(t => t.templateKey === tpl.templateKey);
    if(sameVersion){
      if(sameVersion.active === false){
        await dbPut('templates', {...sameVersion, active:true, restoredAt:new Date().toISOString()});
      }
      continue;
    }

    const stale = existing.filter(t => t.source === 'supabase' && t.supabaseId === tpl.supabaseId && t.templateKey !== tpl.templateKey && t.active !== false);
    for(const s of stale) await dbPut('templates', {...s, active:false, supersededAt:new Date().toISOString()});

    await dbPut('templates', {
      ...tpl,
      reportTemplate: inferReportTemplateType(tpl),
      active: true,
      importedAt: new Date().toISOString()
    });
    added += 1;
    updated += stale.length > 0 ? 1 : 0;
    appLog(`Supabase 점검표 동기화: ${tpl.name} (${tpl.supabaseId})`);
  }

  if(added > 0){
    showToast(updated > 0 ? `점검표 ${updated}건 업데이트됨` : `점검표 ${added}건 동기화됨`);
    if(currentTab === 'templates'){
      const c = document.getElementById('content');
      if(c) renderTemplates(c);
    }
  }
  return added;
}

function updateOnlineTag(){
  const tag = byId('offline-tag');
  if(!tag) return Promise.resolve(false);

  if(!navigator.onLine){
    tag.textContent = 'OFFLINE';
    tag.classList.add(UI_CLASS.OFFLINE);
    tag.classList.remove(UI_CLASS.ONLINE);
    return Promise.resolve(false);
  }

  const pingUrl = `./index.html?online-check=${Date.now()}`;

  return fetch(pingUrl, { method:'GET', cache:'no-store' })
    .then(res => {
      if(!res.ok) throw new Error(`online check failed: ${res.status}`);
      tag.textContent = 'ONLINE';
      tag.classList.add(UI_CLASS.ONLINE);
      tag.classList.remove(UI_CLASS.OFFLINE);
      return true;
    })
    .catch(() => {
      tag.textContent = 'OFFLINE';
      tag.classList.add(UI_CLASS.OFFLINE);
      tag.classList.remove(UI_CLASS.ONLINE);
      return false;
    });
}

// ═══════════════════════════════════════════════
//  Tab routing
// ═══════════════════════════════════════════════
function switchTab(tab, event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }

  currentTab = tab;
  document.querySelectorAll('.tab-btn, .desktop-nav-btn').forEach(b=>{
    b.classList.toggle(UI_CLASS.ACTIVE, b.dataset.tab===tab);
  });

  const action = byId('topbar-action');
  setHidden(action, true);
  if(tab !== 'checklist') currentAudit = null;

  // Tab changes are in-app view changes, not page navigation.
  // Reset only the app content scroll so the browser viewport does not jump.
  const content = byId('content');
  if(content) content.scrollTop = 0;

  Promise.resolve(renderTab(tab)).finally(() => {
    const refreshedContent = byId('content');
    if(refreshedContent) refreshedContent.scrollTop = 0;
  });
}

async function renderTab(tab){
  const c = document.getElementById('content');
  c.classList.toggle('web-content', ['home','audits','templates','export'].includes(tab));
  document.getElementById('topbar-title').textContent = '심사 점검표';
  if(tab==='home') await renderHome(c);
  else if(tab==='audits') await renderAudits(c);
  else if(tab==='templates') await renderTemplates(c);
  else if(tab==='export') await renderExport(c);
}


// ═══════════════════════════════════════════════
//  Audit summary helpers
//  - Centralizes repeated YES/NO/OBS/N/A and completion calculations.
//  - Keeps one-file delivery while reducing render/export duplication.
// ═══════════════════════════════════════════════
function getAuditItems(audit){
  return Array.isArray(audit?.items) ? audit.items : [];
}

function countAuditResult(items, resultValue){
  return items.filter(item => normalizeResultValue(item.result) === resultValue).length;
}

function getAuditSummary(audit){
  const items = getAuditItems(audit);
  const total = items.length;
  const answered = items.filter(item => item.result).length;
  const yes = countAuditResult(items, RESULT_VALUE.YES);
  const no = countAuditResult(items, RESULT_VALUE.NO);
  const obs = countAuditResult(items, RESULT_VALUE.OBS);
  const na = countAuditResult(items, RESULT_VALUE.NA);
  const percent = total ? Math.round(answered / total * 100) : 0;

  return {
    total,
    answered,
    percent,
    ok: yes,
    yes,
    ng: no,
    no,
    obs,
    na
  };
}

function getSectionCompletion(items){
  const safeItems = Array.isArray(items) ? items : [];
  return {
    total: safeItems.length,
    answered: safeItems.filter(item => item.result).length
  };
}

function getResultPercent(count, total){
  return total ? `${Math.round(count / total * 100)}%` : '';
}

async function updateStorageStatus(){
  const status = document.getElementById('storage-status');
  if(!status) return;
  if(!navigator.storage?.estimate){
    status.textContent = '이 브라우저는 저장공간 사용량을 제공하지 않습니다. 정기적으로 백업하세요.';
    return;
  }
  try{
    const {usage = 0, quota = 0} = await navigator.storage.estimate();
    if(!quota){
      status.textContent = '저장공간 한도를 확인할 수 없습니다. 정기적으로 백업하세요.';
      return;
    }
    const percent = Math.round(usage / quota * 100);
    const usageMb = (usage / 1024 / 1024).toFixed(1);
    const quotaMb = (quota / 1024 / 1024).toFixed(1);
    status.textContent = `사용량 ${usageMb}MB / ${quotaMb}MB (${percent}%)${percent >= 80 ? ' — 사진을 정리하고 즉시 백업하세요.' : ''}`;
  } catch(e){
    appWarn('저장공간 확인 실패:', e);
    status.textContent = '저장공간을 확인할 수 없습니다. 정기적으로 백업하세요.';
  }
}

function syncDetailStickyOffset(){
  const shell = document.querySelector('.detail-shell');
  const top = document.querySelector('.detail-top');
  if(!shell || !top) return;
  shell.style.setProperty('--detail-sticky-offset', `${Math.ceil(top.getBoundingClientRect().height)}px`);
}

window.addEventListener('resize', () => {
  if(currentAudit) syncDetailStickyOffset();
});

function getChecklistScrollContainer(){
  // Return the element that actually owns vertical scrolling.
  // Tablet split view uses .detail-content for layout, but #content or the
  // document can be the real scroll container depending on viewport/browser.
  const candidates = [
    document.querySelector('.detail-content'),
    byId('content'),
    document.scrollingElement,
    document.documentElement
  ].filter(Boolean);

  return candidates.find(el => el.scrollHeight > el.clientHeight + 1)
    || byId('content')
    || document.scrollingElement
    || document.documentElement;
}

function getElementTopInScroller(el, scroller){
  const scrollerRect = scroller.getBoundingClientRect
    ? scroller.getBoundingClientRect()
    : { top: 0 };
  const elRect = el.getBoundingClientRect();
  return scroller.scrollTop + elRect.top - scrollerRect.top;
}

function getSectionAlignmentOffset(scroller){
  // Use the first section's natural top position as the alignment baseline.
  // This keeps click-jump placement identical to the first section's initial placement
  // without hard-coding sticky header or progress-bar heights.
  const firstSection = document.querySelector('.detail-section-start');
  if(!scroller || !firstSection) return 0;
  return getElementTopInScroller(firstSection, scroller);
}

function scrollToAlignedTarget(target, options = {}){
  syncDetailStickyOffset();
  const scroller = getChecklistScrollContainer();
  if(!scroller || !target) return;

  const alignmentOffset = getSectionAlignmentOffset(scroller);
  const targetTop = getElementTopInScroller(target, scroller);
  const destination = targetTop - alignmentOffset + (options.offset || 0);

  scroller.scrollTo({
    top: Math.max(0, destination),
    behavior: options.behavior || 'smooth'
  });
}

function scrollToChecklistSection(sectionId){
  const target = document.getElementById(sectionId);
  const index = Number(String(sectionId).replace('sec-', ''));

  if(Number.isFinite(index)) setCurrentSectionChip(index, true);
  scrollToAlignedTarget(target);
}

function getSectionIndexForItemIndex(itemIndex){
  const item = currentAudit?.items?.[itemIndex];
  if(!item) return -1;

  const sectionNames = [];
  (currentAudit.items || []).forEach(checkItem => {
    const sectionName = checkItem.section || '일반';
    if(!sectionNames.includes(sectionName)) sectionNames.push(sectionName);
  });

  return sectionNames.indexOf(item.section || '일반');
}

function scrollToChecklistItem(itemIndex){
  const el = document.getElementById('ci-' + itemIndex);
  if(!el) return;

  const body = document.getElementById('cb-' + itemIndex);
  if(body) body.classList.remove('hidden');

  const sectionIndex = getSectionIndexForItemIndex(itemIndex);
  if(sectionIndex >= 0) setCurrentSectionChip(sectionIndex, true);

  // Align incomplete-item jumps with section navigation instead of centering the card.
  // Add a 3px destination correction so the card border does not sit on the sticky boundary.
  scrollToAlignedTarget(el, { offset: 3 });
}

function renderMaturityPanel(audit, item){
  const idx = item._idx;
  const maturity = item.maturity || '';
  const scale = getAuditMaturityScale(audit) || { name: '성숙도 등급', labels: AuditRules.MATURITY_LEVELS };
  // The legacy 4-level scale keeps using getMaturityConsideration exactly as
  // before (name-keyed, falls back to DEFAULT_MATURITY canned copy) so
  // existing checklists render identically. Any other scale (custom length,
  // or a 4-length scale with different label text) uses the generalized,
  // position-based lookup with no canned fallback.
  const isLegacyScale = scale.labels.length === AuditRules.MATURITY_LEVELS.length
    && scale.labels.every((label, i) => label === AuditRules.MATURITY_LEVELS[i]);

  return `<div class="maturity-panel">
    <div class="maturity-panel-title">Maturity Assessment</div>
    <div class="maturity-level-list" role="radiogroup" aria-label="Maturity Assessment">

        const selected = maturity === level;
        return `<div class="maturity-card ${selected ? 'selected' : ''}" role="radio" aria-checked="${selected ? 'true' : 'false'}" aria-disabled="${audit.status===AUDIT_STATUS.DONE ? 'true' : 'false'}" tabindex="${audit.status===AUDIT_STATUS.DONE ? '-1' : '0'}" ${audit.status===AUDIT_STATUS.DONE ? '' : `onclick="setMaturityResult(${audit.id},${idx},'${level}', event)" onkeydown="if(event.key==='Enter'||event.key===' '){setMaturityResult(${audit.id},${idx},'${level}', event)}"`}>

}

  const completion = getSectionCompletion(secItems);
  return { ...completion, className: 'is-neutral' };
}

function getSectionChipLabel(sectionName){
  // Section headers often include an ordinal prefix such as "5. 지상 조업".
  // The chip already communicates position through horizontal order, so remove
  // the prefix to reduce numeric noise while keeping the original section title below.
  return String(sectionName || '').replace(/^\s*\d+\s*[.)]\s*/, '').trim() || String(sectionName || '일반');
}

function renderSectionAnchorChip(sectionName, secItems, sectionIndex, idPrefix = 'nav-sec-'){
  const state = getSectionNavState(secItems);
  const label = getSectionChipLabel(sectionName);
  const chipId = `${idPrefix}${sectionIndex}`;
  return `<button type="button" id="${chipId}" data-section-index="${sectionIndex}" class="anchor-chip ${state.className}" onclick="scrollToChecklistSection('sec-${sectionIndex}')" aria-label="${esc(sectionName)} 섹션으로 이동, ${state.answered}/${state.total} 항목 완료">
    <span class="anchor-chip-label">${esc(label)}</span>
    <span class="anchor-chip-count">${state.answered}/${state.total}</span>
  </button>`;
}

function renderPendingAnchorChip(audit){
  const summary = getAuditSummary(audit);
  const pending = Math.max(summary.total - summary.answered, 0);
  return `<button type="button" class="anchor-chip is-neutral" onclick="jumpToNext(${audit.id})" aria-label="미완료 항목 ${pending}개">
    <span class="anchor-chip-label">미완료</span>
    <span class="anchor-chip-count">${pending}</span>
  </button>`;
}

let sectionChipScrollHandler = null;
let sectionChipScrollFrame = null;
let currentSectionChipIndex = -1;

function getCurrentChecklistSectionIndex(){
  const headers = [...document.querySelectorAll('.detail-section-start')];
  const scroller = getChecklistScrollContainer();
  if(headers.length === 0 || !scroller) return -1;

  const alignmentOffset = getSectionAlignmentOffset(scroller);
  const activeLine = scroller.scrollTop + alignmentOffset + 1;
  let currentIndex = 0;

  headers.forEach((header, index) => {
    if(getElementTopInScroller(header, scroller) <= activeLine) currentIndex = index;
  });

  return currentIndex;
}

function setCurrentSectionChip(index, shouldAlignStart = true){
  if(index < 0) return;
  const indexChanged = index !== currentSectionChipIndex;
  currentSectionChipIndex = index;

  document.querySelectorAll('.detail-anchor-nav .anchor-chip, .detail-sidebar .anchor-chip').forEach(chip => {
    chip.classList.remove('is-current');
  });

  const activeChips = [
    document.getElementById('nav-mobile-' + index),
    document.getElementById('nav-side-' + index)
  ].filter(Boolean);

  if(activeChips.length === 0) return;
  activeChips.forEach(chip => chip.classList.add('is-current'));

  if(shouldAlignStart && indexChanged){
    activeChips.forEach(chip => chip.scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'}));
  }
}

function updateCurrentSectionChip(shouldAlignStart = true){
  setCurrentSectionChip(getCurrentChecklistSectionIndex(), shouldAlignStart);
}

let sectionChipScrollContainer = null;

function setupSectionChipTracking(){
  const scroller = getChecklistScrollContainer();
  if(!scroller) return;

  if(sectionChipScrollHandler && sectionChipScrollContainer){
    sectionChipScrollContainer.removeEventListener('scroll', sectionChipScrollHandler);
  }

  currentSectionChipIndex = -1;
  sectionChipScrollContainer = scroller;
  sectionChipScrollHandler = () => {
    if(sectionChipScrollFrame) return;
    sectionChipScrollFrame = requestAnimationFrame(() => {
      sectionChipScrollFrame = null;
      updateCurrentSectionChip(true);
    });
  };

  scroller.addEventListener('scroll', sectionChipScrollHandler, {passive:true});
  requestAnimationFrame(() => updateCurrentSectionChip(false));
}

function openSectionSheet(){
  const modal = byId('modal-sections');
  if(modal && !modal.dataset.backdropBound){
    modal.addEventListener('click', event => {
      if(event.target === modal) closeModal('modal-sections');
    });
    modal.dataset.backdropBound = '1';
  }

  updateCurrentSectionChip(false);
  document.querySelectorAll('#modal-sections .section-sheet-item[data-section-index]').forEach(item => {
    item.classList.toggle('is-current', Number(item.dataset.sectionIndex) === currentSectionChipIndex);
  });
  openModal('modal-sections');
}

function goToSectionFromSheet(sectionIndex){
  closeModal('modal-sections');
  requestAnimationFrame(() => scrollToChecklistSection(`sec-${sectionIndex}`));
}

function jumpToPendingFromSheet(auditId){
  closeModal('modal-sections');
  requestAnimationFrame(() => jumpToNext(auditId));
}

function toggleCheckItem(idx){
  const body = document.getElementById('cb-'+idx);
  if(!body) return;
  body.classList.toggle('hidden');
}

function preserveDetailScroll(previousScrollTop, openIdx, anchorTopBefore = null){
  const restore = () => {
    const c = getChecklistScrollContainer();
    const card = document.getElementById('ci-'+openIdx);
    const body = document.getElementById('cb-'+openIdx);
    if(body) body.classList.remove('hidden');

    if(!c) return;

    // Result/Maturity selection is an in-place edit.
    // Keep the tapped card at the same viewport position after full re-render.
    // This avoids the mobile browser's focus/scroll correction from making the page jump.
    if(typeof anchorTopBefore === 'number' && card){
      const anchorTopAfter = card.getBoundingClientRect().top;
      c.scrollTop += anchorTopAfter - anchorTopBefore;
    } else {
      c.scrollTop = previousScrollTop;
    }
  };

  restore();
  requestAnimationFrame(() => {
    restore();
    requestAnimationFrame(restore);
  });
  setTimeout(restore, 80);
  setTimeout(restore, 180);
}

function stopInputScrollJump(event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }
  if(document.activeElement && typeof document.activeElement.blur === 'function'){
    document.activeElement.blur();
  }
}

async function setMaturityResult(auditId, idx, maturity, event){
  stopInputScrollJump(event);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit) return;
    if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
    applyPendingNotesToAudit(audit);

    const content = getChecklistScrollContainer();
    const anchorCard = document.getElementById('ci-'+idx);
    const previousScrollTop = content ? content.scrollTop : 0;
    const anchorTopBefore = anchorCard ? anchorCard.getBoundingClientRect().top : null;

    audit.items[idx].maturity = maturity;
    currentAudit = audit;
    await dbPut('audits', audit);

    renderChecklist(audit);
    preserveDetailScroll(previousScrollTop, idx, anchorTopBefore);
    showToast('성숙도 수준이 저장되었습니다');
  });
}

async function setResult(auditId, idx, result, event){
  stopInputScrollJump(event);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit) return;
    if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
    applyPendingNotesToAudit(audit);

    const content = getChecklistScrollContainer();
    const anchorCard = document.getElementById('ci-'+idx);
    const previousScrollTop = content ? content.scrollTop : 0;
    const anchorTopBefore = anchorCard ? anchorCard.getBoundingClientRect().top : null;

    const wasAnswered = !!audit.items[idx].result;
    audit.items[idx].result = normalizeResultValue(result);
    currentAudit = audit;
    await dbPut('audits', audit);

    renderChecklist(audit);
    preserveDetailScroll(previousScrollTop, idx, anchorTopBefore);
    if(!wasAnswered && result) showToast('저장되었습니다');
  });
}

const noteSaveTimers = new Map();
const pendingNoteValues = new Map();
const auditWriteQueues = new Map();

function enqueueAuditWrite(auditId, write){
  const previous = auditWriteQueues.get(auditId) || Promise.resolve();
  const next = previous.catch(() => {}).then(write);
  const settled = next.finally(() => {
    if(auditWriteQueues.get(auditId) === settled) auditWriteQueues.delete(auditId);
  });
  auditWriteQueues.set(auditId, settled);
  return next;
}

function setChecklistFilter(value){
  checklistFilter = value;
  if(currentAudit) renderChecklist(currentAudit);
}

function waitForAuditWrites(auditId){
  return auditWriteQueues.get(auditId) || Promise.resolve();
}

function clearPendingNoteWrites(){
  for(const timer of noteSaveTimers.values()) clearTimeout(timer);
  noteSaveTimers.clear();
  pendingNoteValues.clear();
}

function getNoteSaveKey(auditId, idx){
  return `${auditId}:${idx}`;
}

function getPendingNoteValue(auditId, idx, fallback = ''){
  const key = getNoteSaveKey(auditId, idx);
  return pendingNoteValues.has(key) ? pendingNoteValues.get(key) : fallback;
}

function applyPendingNotesToAudit(audit){
  if(!audit?.id || !Array.isArray(audit.items)) return audit;
  audit.items.forEach((item, idx) => {
    const key = getNoteSaveKey(audit.id, idx);
    if(pendingNoteValues.has(key)) item.note = pendingNoteValues.get(key);
  });
  return audit;
}

function scheduleNoteSave(auditId, idx, note){
  if(currentAudit?.id === auditId && currentAudit.status === AUDIT_STATUS.DONE){
    showToast('완료된 심사는 다시 열어야 수정할 수 있습니다');
    return;
  }
  const key = getNoteSaveKey(auditId, idx);
  pendingNoteValues.set(key, note);

  if(currentAudit?.id === auditId && currentAudit.items?.[idx]){
    currentAudit.items[idx].note = note;
  }

  clearTimeout(noteSaveTimers.get(key));
  noteSaveTimers.set(key, setTimeout(() => persistNoteValue(auditId, idx), 400));
}

async function persistNoteValue(auditId, idx){
  const key = getNoteSaveKey(auditId, idx);
  const note = pendingNoteValues.get(key);
  if(note === undefined) return;

  noteSaveTimers.delete(key);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit?.items?.[idx] || audit.status === AUDIT_STATUS.DONE) return;
    audit.items[idx].note = note;
    await dbPut('audits', audit);
    if(currentAudit?.id === auditId && currentAudit.items?.[idx]) currentAudit.items[idx].note = note;
    if(pendingNoteValues.get(key) === note) pendingNoteValues.delete(key);
  });
}

function flushNoteSave(auditId, idx){
  const key = getNoteSaveKey(auditId, idx);
  clearTimeout(noteSaveTimers.get(key));
  noteSaveTimers.delete(key);
  return persistNoteValue(auditId, idx);
}

async function deleteAudit(id, event){
  event?.stopPropagation();
  const audit = await dbGet('audits', id);
  if(!audit) return;
  if(!confirm(`"${audit.title}" 심사 기록과 첨부 사진을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
  await dbDelete('audits', id);
  if(currentAudit?.id === id) currentAudit = null;
  showToast('심사 기록을 삭제했습니다');
  switchTab('audits');
}

async function flushPendingNotesForAudit(auditId){
  const indices = [...pendingNoteValues.keys()]
    .filter(key => key.startsWith(`${auditId}:`))
    .map(key => Number(key.slice(String(auditId).length + 1)));
  for(const idx of indices) await flushNoteSave(auditId, idx);
}

function jumpToNext(auditId){
  const items = currentAudit?.items||[];
  const nextIdx = items.findIndex(i=>!i.result);
  if(nextIdx<0){ showToast('모든 항목이 완료되었습니다 ✓'); return; }
  scrollToChecklistItem(nextIdx);
}

async function finishAudit(id){
  await flushPendingNotesForAudit(id);
  await waitForAuditWrites(id);
  const audit = await dbGet('audits', id);
  if(!audit) return;
  if(audit.status === AUDIT_STATUS.DONE){ showToast('이미 완료된 심사입니다'); return; }
  const unanswered = audit.items?.filter(i=>!i.result).length||0;
  if(!AuditRules.canCompleteAudit(audit)){
    showToast(`미완료 항목 ${unanswered}개를 입력해야 심사를 완료할 수 있습니다`);
    jumpToNext(id);
    return;
  }
  audit.status=AUDIT_STATUS.DONE;
  await dbPut('audits', audit);
  showToast('심사가 완료되었습니다');
  backFromChecklist();
}

async function reopenAudit(id){
  const audit = await dbGet('audits', id);
  if(!audit || audit.status !== AUDIT_STATUS.DONE) return;
  if(!confirm('완료 상태를 해제하고 심사를 다시 수정하시겠습니까?')) return;
  audit.status = AUDIT_STATUS.PROGRESS;
  audit.reopenedAt = new Date().toISOString();
  await dbPut('audits', audit);
  currentAudit = audit;
  renderChecklist(audit);
  showToast('심사를 다시 열었습니다');
}

function backFromChecklist(){
  setVisible('topbar', true);
  setVisible('tabbar', true);
  setHidden('topbar-action', true);
  currentAudit=null;
  switchTab('audits');
}

async function openNewAuditModal(){

  sel.innerHTML='<option value="">— 점검표를 선택하세요 —</option>'+

async function createAudit(){
  const title = document.getElementById('na-title').value.trim();
  const tplId = parseInt(document.getElementById('na-template').value);
  const date  = document.getElementById('na-date').value;
  const auditor = document.getElementById('na-auditor').value.trim();
  const dept  = document.getElementById('na-dept').value.trim();

  if(!title){ showToast('심사 제목을 입력하세요'); return; }
  if(!tplId){ showToast('점검표를 선택하세요'); return; }

  const tpl = await getNormalizedTemplate(tplId);
  if(!tpl){ showToast('점검표를 불러올 수 없습니다'); return; }
  if(!tpl.items.length){ showToast('점검표 항목 형식이 맞지 않습니다. 다시 업로드하세요'); return; }

  const maturityScale = tpl.maturityScale || deriveMaturityScale(tpl);
  const audit = {
    title, date, auditor, dept,
    templateId: tplId,
    templateName: tpl.name || '',
    templateVersion: getTemplateVersionLabel(tpl),
    checklistUiType: tpl.checklistUiType || getChecklistUiType(tpl),
    reportTemplate: tpl.reportTemplate || inferReportTemplateType(tpl),
    maturityScale,
    status: AUDIT_STATUS.PROGRESS,
    createdAt: new Date().toISOString(),
    items: tpl.items.map(i=>({...i, result:null, note:'', photos:[], maturityOn: i.maturityOn ?? Boolean(maturityScale)}))
  };
  const id = await dbPut('audits', audit);
  closeModal('modal-newaudit');
  audit.id = id;
  showToast('심사가 시작되었습니다');
  openAudit(id);
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone')?.classList.remove('drag');
  const file = e.dataTransfer?.files[0];
  if(file) handleFileSelect(file);
}

function handleFileSelect(file){
  if(!file) return;
  if(!getRegistrantSession()?.user){ showToast('점검표를 등록하려면 먼저 로그인하세요'); return; }
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls'].includes(ext)){ showToast('Excel 파일(.xlsx)만 지원합니다'); return; }

  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // Skip header row
      const items=[], sections=new Set();
      for(let i=1;i<rows.length;i++){
        const [section,ref,question,refStd,externalRef,conformityCriteria,establishedCriteria,matureCriteria,leadingCriteria,type] = rows[i];
        if(!question) continue;
        sections.add(section||'일반');
        items.push(normalizeChecklistItem({
          section: section||'일반',
          ref,
          question,
          refStd,
          externalRef,
          conformityCriteria,
          establishedCriteria,
          matureCriteria,
          leadingCriteria,
          type: type || 'YES/NO/OBS/N/A'
        }));
      }
      if(items.length===0){ showToast('항목을 찾을 수 없습니다. 형식을 확인하세요'); return; }

      openReviewWizard({
        mode: 'new',
        name: file.name.replace(/\.[^.]+$/,''),
        filename: file.name,
        sections: [...sections],
        items,
        scaleName: '성숙도 등급',
        labels: [...AuditRules.MATURITY_LEVELS]
      });
    } catch(err){
      showToast('파일을 읽을 수 없습니다: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════
//  wayfinder #10/#11 — 등록 검토 마법사 (2단계: 척도 정의 → 항목 검토)
//  prototype/review-modal variant B의 마크업/동작을 실제 데이터에 연동.
//  확인 시 Supabase에 실제로 등록/수정한다 (#11).
// ═══════════════════════════════════════════════
let reviewWizard = null;

function openReviewWizard({mode, templateId, name, filename, sections, items, scaleName, labels}){
  reviewWizard = {
    mode, templateId,
    name, filename,
    sections: sections || [],
    items: items.map((it, i) => ({...it, _idx:i, maturityOn: it.maturityOn ?? AuditRules.suggestMaturityOn(it), _suggested: AuditRules.suggestMaturityOn(it)})),
    scaleName: scaleName || '성숙도 등급',
    labels: labels && labels.length ? [...labels] : ['Conformity','Established','Mature','Leading'],
    step: 1
  };
  renderReviewWizard();
  openModal('modal-review');
}

function closeReviewWizard(){
  reviewWizard = null;
  closeModal('modal-review');
}

function reviewScaleEditor(){
  const w = reviewWizard;
  return `<div class="review-scale-box">
    <input class="review-scale-name" value="${esc(w.scaleName)}" placeholder="척도 이름 (예: 성숙도 등급)" oninput="reviewSetScaleName(this.value)">
    ${w.labels.map((l,i)=>`<div class="review-label-row">
      <input value="${esc(l)}" oninput="reviewSetLabel(${i},this.value)">
      <button type="button" class="review-icon-btn" title="위로" ${i===0?'disabled':''} onclick="reviewMoveLabel(${i},-1)">↑</button>
      <button type="button" class="review-icon-btn" title="아래로" ${i===w.labels.length-1?'disabled':''} onclick="reviewMoveLabel(${i},1)">↓</button>
      <button type="button" class="review-icon-btn" title="삭제" onclick="reviewRemoveLabel(${i})">✕</button>
    </div>`).join('')}
    <button type="button" class="review-add-label" onclick="reviewAddLabel()">+ 라벨 추가</button>
    <div class="review-preview">
      ${w.labels.map(l=>`<div class="maturity-card"><div class="maturity-card-head"><span class="maturity-radio" aria-hidden="true"></span><div class="maturity-card-title">${esc(l)}</div></div></div>`).join('')}
    </div>
  </div>`;
}

function reviewItemRow(item){
  return `<div class="review-item-row">
    <div class="review-item-main">
      <div class="review-item-tag">${esc(item.section)} · ${esc(item.ref || '')}</div>
      <div class="review-item-q">${esc(item.question)}</div>
      ${item._suggested ? `<div class="review-item-hint">criteria 텍스트 있음 → 기본 제안 ON</div>` : ''}
    </div>
    <button type="button" class="review-toggle ${item.maturityOn?'on':''}" role="switch" aria-checked="${item.maturityOn}" onclick="reviewToggleItem(${item._idx})"></button>
  </div>`;
}

function renderReviewWizard(){
  const w = reviewWizard;
  if(!w) return;
  const step1 = w.step === 1;
  const onCount = w.items.filter(i=>i.maturityOn).length;

  document.getElementById('modal-review-title').textContent = w.mode === 'edit' ? `점검표 수정 — ${w.name}` : '점검표 등록 검토';

  document.getElementById('review-body').innerHTML = `
    <div class="review-steps">
      <div class="review-step ${step1?'active':''}">1. 척도 정의</div>
      <div class="review-step ${!step1?'active':''}">2. 항목 검토</div>
    </div>
    ${step1 ? `
      <div class="review-sub">이 템플릿의 모든 성숙도 항목이 공유할 척도를 정의하세요. 라벨은 자유롭게 추가/삭제/순서변경할 수 있습니다.</div>
      ${reviewScaleEditor()}
    ` : `
      <div class="review-sub">척도: <b>${esc(w.scaleName)}</b> (${w.labels.length}단계) — <a href="#" onclick="event.preventDefault();reviewGotoStep(1)">수정</a></div>
      <div>${w.items.map(reviewItemRow).join('')}</div>
    `}
  `;

  document.getElementById('review-actions').innerHTML = step1
    ? `<button type="button" class="btn btn-ghost flex-1" onclick="closeReviewWizard()">취소</button>
       <button type="button" class="btn btn-teal flex-2" onclick="reviewGotoStep(2)">다음</button>`
    : `<button type="button" class="btn btn-ghost flex-1" onclick="reviewGotoStep(1)">이전</button>
       <button type="button" class="btn btn-teal flex-2" onclick="confirmReviewWizard()">확인 (${onCount}/${w.items.length}개 성숙도 ON)</button>`;
}

function reviewSetScaleName(v){ reviewWizard.scaleName = v; }
function reviewSetLabel(i,v){ reviewWizard.labels[i] = v; }
function reviewAddLabel(){ reviewWizard.labels.push('새 라벨'); renderReviewWizard(); }
function reviewRemoveLabel(i){ reviewWizard.labels.splice(i,1); renderReviewWizard(); }
function reviewMoveLabel(i,dir){
  const labels = reviewWizard.labels;
  const j = i + dir;
  if(j < 0 || j >= labels.length) return;
  [labels[i], labels[j]] = [labels[j], labels[i]];
  renderReviewWizard();
}
function reviewToggleItem(idx){
  const item = reviewWizard.items.find(i=>i._idx===idx);
  item.maturityOn = !item.maturityOn;
  renderReviewWizard();
}
function reviewGotoStep(n){
  if(n === 2){
    const check = AuditRules.validateMaturityScale({name:reviewWizard.scaleName, labels:reviewWizard.labels});
    if(!check.valid){ showToast(check.error); return; }
  }
  reviewWizard.step = n;
  renderReviewWizard();
}

async function confirmReviewWizard(){
  const w = reviewWizard;
  const session = getRegistrantSession();
  if(!session?.user){ showToast('로그인이 필요합니다'); return; }

  const check = AuditRules.validateMaturityScale({name:w.scaleName, labels:w.labels});
  if(!check.valid){ showToast(check.error); return; }

  const payload = {
    name: w.name,
    filename: w.filename,
    sections: w.sections,
    items: w.items.map(({_idx, _suggested, ...item}) => item),
    maturityScale: {name: w.scaleName, labels: w.labels}
  };

  try{
    const client = SupabaseClient.getClient();
    const saved = w.mode === 'edit'
      ? await ChecklistSource.updateSupabaseTemplate(client, session.accessToken, session.user.id, w.templateId, payload)
      : await ChecklistSource.registerSupabaseTemplate(client, session.accessToken, session.user.id, payload);

    const existing = await dbAll('templates');
    const localMatch = existing.find(t => t.source === 'supabase' && t.supabaseId === saved.supabaseId);
    await dbPut('templates', {
      ...saved,
      reportTemplate: inferReportTemplateType(saved),
      active: true,
      importedAt: new Date().toISOString(),
      ...(localMatch ? {id: localMatch.id} : {})
    });

    closeReviewWizard();
    showToast(w.mode === 'edit' ? '점검표가 수정되었습니다' : '점검표가 등록되었습니다');
    switchTab('templates');
  }catch(e){
    showToast('저장에 실패했습니다: ' + (e.message || ''));
  }
}

async function openReviewWizardForEdit(localId){
  const tpl = await getNormalizedTemplate(localId);
  if(!tpl || tpl.source !== 'supabase'){ showToast('수정할 수 없는 점검표입니다'); return; }
  openReviewWizard({
    mode: 'edit',
    templateId: tpl.supabaseId,
    name: tpl.name,
    filename: tpl.filename,
    sections: tpl.sections,
    items: tpl.items,
    scaleName: tpl.maturityScale?.name || '성숙도 등급',
    labels: tpl.maturityScale?.labels || [...AuditRules.MATURITY_LEVELS]
  });
}

const BACKUP_FORMAT = 'audit-app-backup';
const BACKUP_VERSION = 1;

async function exportLocalBackup(){
  const [audits, templates] = await Promise.all([dbAll('audits'), dbAll('templates')]);
  const backup = {
    format: BACKUP_FORMAT,
    version: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    audits,
    templates
  };
  const blob = new Blob([JSON.stringify(backup)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `audit-app-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`백업 완료: 심사 ${audits.length}건, 점검표 ${templates.length}건`);
}

function selectLocalBackup(){
  document.getElementById('file-backup')?.click();
}

function isValidBackup(backup){
  return backup && backup.format === BACKUP_FORMAT && backup.version === BACKUP_VERSION &&
    Array.isArray(backup.audits) && Array.isArray(backup.templates) &&
    backup.audits.every(audit => audit && typeof audit === 'object' && Array.isArray(audit.items)) &&
    backup.templates.every(template => template && typeof template === 'object' && Array.isArray(template.items));
}

function restoreLocalBackup(backup){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['audits', 'templates'], 'readwrite');
    const audits = tx.objectStore('audits');
    const templates = tx.objectStore('templates');
    audits.clear();
    templates.clear();
    backup.templates.forEach(template => templates.put(template));
    backup.audits.forEach(audit => audits.put(audit));
    tx.oncomplete = () => resolve();
    tx.onabort = tx.onerror = () => reject(tx.error || new Error('저장소에 백업 데이터를 기록할 수 없습니다.'));
  });
}

function handleLocalBackupFile(file){
  if(!file) return;
  const input = document.getElementById('file-backup');
  if(input) input.value = '';
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const backup = JSON.parse(String(e.target.result || ''));
      if(!isValidBackup(backup)) throw new Error('지원하지 않는 백업 파일입니다.');
      const first = confirm(`백업 파일에는 심사 ${backup.audits.length}건, 점검표 ${backup.templates.length}건이 있습니다. 현재 기기 데이터를 모두 교체하시겠습니까?`);
      if(!first) return;
      const second = confirm('현재 기기의 심사 기록, 사진, 점검표가 모두 삭제되고 백업 파일로 교체됩니다. 계속하시겠습니까?');
      if(!second) return;
      clearPendingNoteWrites();
      await Promise.all([...auditWriteQueues.values()]);
      await restoreLocalBackup(backup);
      currentAudit = null;
      pendingPhotos = [];
      showToast('백업 데이터를 복원했습니다');
      switchTab('home');
    } catch(err){
      appError('백업 복원 실패:', err);
      showToast(err.message || '백업 파일을 복원할 수 없습니다');
    }
  };
  reader.readAsText(file, 'utf-8');
}

function openPhotoModal(auditId, itemIdx){
  currentPhotoTarget = {auditId, itemIdx};
  pendingPhotos = [...(currentAudit?.items[itemIdx]?.photos||[])];
  renderPhotoPreview();
  openModal('modal-photo');

function renderPhotoPreview(){
  const area = document.getElementById('photo-preview-area');
  if(!area) return;
  area.innerHTML = pendingPhotos.map((p,i)=>`
    <div class="photo-frame">
      <img class="photo-thumb" src="${p}" alt="사진">
      <button type="button" onclick="pendingPhotos.splice(${i},1);renderPhotoPreview()" class="photo-remove" aria-label="첨부 사진 ${i + 1} 삭제">✕</button>
    </div>`).join('');
}

function takePhoto(){
  document.getElementById('file-camera').click();
  document.getElementById('file-camera').onchange = e=>{
    handleImageFile(e.target.files[0]);
    e.target.value='';
  };
}
function pickPhoto(){
  document.getElementById('file-gallery').click();
  document.getElementById('file-gallery').onchange = e=>{
    handleImageFile(e.target.files[0]);
    e.target.value='';
  };
}
function handleImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload=e=>{
    // Resize to max 800px for storage
    const img = new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhotos.push(canvas.toDataURL('image/jpeg',0.75));
      renderPhotoPreview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function savePhoto(){
  if(!currentPhotoTarget) return;
  const {auditId, itemIdx} = currentPhotoTarget;
  const audit = await dbGet('audits', auditId);
  if(!audit) return;
  if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
  audit.items[itemIdx].photos = [...pendingPhotos];
  currentAudit = audit;
  await dbPut('audits', audit);
  // Refresh photos in UI
  const area = document.getElementById('photos-'+itemIdx);
  if(area){
    area.innerHTML = pendingPhotos.map(p=>`<img class="photo-thumb photo-thumb-clickable" src="${p}" onclick="viewPhoto('${p}')" alt="사진">`).join('')+
      `<div class="photo-add" onclick="openPhotoModal(${auditId},${itemIdx})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="4"/><path d="M5 7H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V9a2 2 0 00-2-2h-2l-2-3H9L7 7z"/></svg>
        <span>추가</span>
      </div>`;
  }
  closeModal('modal-photo');
  showToast(`사진 ${pendingPhotos.length}장 저장됨`);
}

function viewPhoto(src){
