<script>
'use strict';
// ═══════════════════════════════════════════════
//  DB (IndexedDB via simple wrapper)
// ═══════════════════════════════════════════════
const DB_NAME = 'AuditApp', DB_VER = 2;
const UI_CLASS = Object.freeze({
  HIDDEN: 'hidden',
  OPEN: 'open',
  ACTIVE: 'active',
  ONLINE: 'is-online',
  OFFLINE: 'is-offline'
});
let db;

function byId(id){
  return document.getElementById(id);
}

function setHidden(elOrId, hidden = true){
  const el = typeof elOrId === 'string' ? byId(elOrId) : elOrId;
  if(!el) return;
  el.classList.toggle(UI_CLASS.HIDDEN, Boolean(hidden));
}

function setVisible(elOrId, visible = true){
  setHidden(elOrId, !visible);
}

function openDB(){
  return AuditStore.open(DB_NAME, DB_VER).then(database => { db = database; return database; });
}

function dbAll(store){
  return AuditStore.all(db, store);
}
function dbGet(store,id){
  return AuditStore.get(db, store, id);
}
function dbPut(store,obj){
  return AuditStore.put(db, store, obj);
}
function dbDelete(store,id){
  return AuditStore.delete(db, store, id);
}

function dbClear(store){
  return AuditStore.clear(db, store);
}

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let currentTab = 'home';
let currentAudit = null;
let checklistFilter = 'all';
let currentPhotoTarget = null; // {auditId, itemIndex}
let pendingPhotos = [];
let checklistSyncState = { checked: false, reachable: null, message: '점검표 서버 확인 전' };

// Debug logging is disabled by default in production.
// Add ?debug=1 to the URL when console diagnostics are needed.
const DEBUG_MODE = new URLSearchParams(location.search).get('debug') === '1';
function appLog(...args){ if(DEBUG_MODE) console.log(...args); }
function appWarn(...args){ if(DEBUG_MODE) console.warn(...args); }
function appError(...args){ if(DEBUG_MODE) console.error(...args); }

const AUDIT_STATUS = Object.freeze({
  PROGRESS: 'progress',
  DONE: 'done'
});

const RESULT_VALUE = Object.freeze({
  YES: 'YES',
  NO: 'NO',
  OBS: 'OBS',
  NA: 'N/A'
});


function inferReportTemplateType(source){
  return AuditRules.inferReportTemplateType(source);
}

function getReportTemplateLabel(type){
  return type === 'report-type-2' ? '2번 양식(현장탑승심사표)' : '1번 양식(기본 결과보고서)';
}

function getChecklistUiType(source){
  return AuditRules.getChecklistUiType(source);
}


// 관리자 모드
// - 일반 사용자는 GitHub에서 동기화된 공식 점검표로 심사만 수행한다.
// - 관리자는 URL에 ?admin=1을 붙여 점검표 업로드/삭제 등 관리 기능을 표시한다.
const ADMIN_MODE_STORAGE_KEY = 'auditAppAdminMode';

function initAdminModeFromUrl(){
  const params = new URLSearchParams(location.search);
  if(params.get('admin') === '1') localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  if(params.get('admin') === '0') localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
}

function isAdminMode(){
  return localStorage.getItem(ADMIN_MODE_STORAGE_KEY) === '1';
}

function setAdminMode(enabled){
  if(enabled) localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  else localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
  showToast(enabled ? '관리자 모드가 켜졌습니다' : '관리자 모드가 꺼졌습니다');
  switchTab(currentTab);
}

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
initAdminModeFromUrl();
initEmailLinkSignIn();

openDB().then(()=>{
  updateOnlineTag();
  window.addEventListener('online', updateOnlineTag);
  window.addEventListener('offline', updateOnlineTag);
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden) updateOnlineTag();
  });
  repairStoredTemplates()
    .catch(e => appWarn('기존 점검표 호환 보정 실패:', e))
    .then(() => autoLoadChecklists())
    .catch(e => appWarn('자동 점검표 로드 실패:', e))
    .finally(()=> switchTab('home'));
  restoreRegistrantSession()
    .catch(e => appWarn('등록자 세션 복원 실패:', e))
    .then(() => { if(currentTab === 'templates'){ const c = document.getElementById('content'); if(c) renderTemplates(c); } });
}).catch(e=>{
  appError('DB 초기화 실패:', e);
  document.getElementById('content').innerHTML = '<div class="empty"><h3>앱 초기화 실패</h3><p>브라우저 저장소 접근을 확인한 뒤 다시 실행하세요.</p></div>';
});


// ═══════════════════════════════════════════════
//  Template compatibility / migration helpers
//  - 기존 기기에 저장된 과거 점검표 데이터를 삭제하지 않고 새 구조로 보정한다.
// ═══════════════════════════════════════════════
function normalizeChecklistItem(item){
  if(!item || typeof item !== 'object') return null;

  const question = String(
    item.question ?? item.title ?? item.name ?? item.item ?? item.checkItem ?? item['점검 질문'] ?? item['점검항목'] ?? ''
  ).trim();
  if(!question) return null;

  return {
    section: String(item.section ?? item.category ?? item.group ?? item['섹션명'] ?? item['섹션'] ?? '일반').trim() || '일반',
    ref: String(item.ref ?? item.no ?? item.number ?? item.code ?? item['항목번호'] ?? '').trim(),
    question,
    refStd: String(item.refStd ?? item.standard ?? item.reference ?? item.regulation ?? item['참조규정'] ?? '').trim(),
    externalRef: String(item.externalRef ?? item.external ?? item.externalReference ?? item['외부참조'] ?? item['External Ref.'] ?? '').trim(),
    conformityCriteria: String(item.conformityCriteria ?? item.conformity ?? item['Conformity Criteria'] ?? item['Conformity'] ?? item['성숙도 Conformity'] ?? '').trim(),
    establishedCriteria: String(item.establishedCriteria ?? item.established ?? item['Established Criteria'] ?? item['Established'] ?? item['성숙도 Established'] ?? '').trim(),
    matureCriteria: String(item.matureCriteria ?? item.mature ?? item['Mature Criteria'] ?? item['Mature'] ?? item['성숙도 Mature'] ?? '').trim(),
    leadingCriteria: String(item.leadingCriteria ?? item.leading ?? item['Leading Criteria'] ?? item['Leading'] ?? item['성숙도 Leading'] ?? '').trim(),
    type: String(item.type ?? item.answerType ?? item['점검유형'] ?? 'YES/NO/OBS/N/A').trim() || 'YES/NO/OBS/N/A',
    result: normalizeResultValue(item.result) || null,
    maturity: item.maturity ?? '',
    // wayfinder #8 — item-level maturityOn/maturityGuidance are authored per
    // item (e.g. a Supabase-registered template), unlike the other fields
    // above which are always inferred/defaulted from a raw spreadsheet row.
    maturityOn: item.maturityOn,
    maturityGuidance: Array.isArray(item.maturityGuidance) ? item.maturityGuidance : undefined,
    note: String(item.note ?? item.memo ?? item.comment ?? item['비고'] ?? ''),
    photos: Array.isArray(item.photos) ? item.photos : []
  };
}

function normalizeTemplate(template){
  const t = template && typeof template === 'object' ? template : {};
  let rawItems = [];

  if(Array.isArray(t.items)) rawItems = t.items;
  else if(Array.isArray(t.questions)) rawItems = t.questions;
  else if(Array.isArray(t.rows)) rawItems = t.rows;
  else if(Array.isArray(t.checklist)) rawItems = t.checklist;

  const items = rawItems.map(normalizeChecklistItem).filter(Boolean);
  const sectionSource = Array.isArray(t.sections) && t.sections.length
    ? t.sections
    : [...new Set(items.map(i => i.section || '일반'))];

  return {
    ...t,
    name: String(t.name || t.title || t.filename || '이름 없는 점검표').trim(),
    version: String(t.version || '').trim(),
    source: t.source || (t.filename ? 'preset' : 'manual'),
    active: t.active !== false,
    sha: String(t.sha || '').trim(),
    updatedAt: String(t.updatedAt || '').trim(),
    fingerprint: String(t.fingerprint || '').trim(),
    templateKey: t.templateKey || (t.filename && t.version ? `${t.filename}@@${t.version}` : ''),
    reportTemplate: inferReportTemplateType(t),
    checklistUiType: t.checklistUiType || getChecklistUiType(t),
    sections: sectionSource.map(s => String(s || '일반').trim()).filter(Boolean),
    items
  };
}

async function getNormalizedTemplates(){
  const templates = await dbAll('templates');
  return templates.map(normalizeTemplate);
}

async function getNormalizedTemplate(id){
  const template = await dbGet('templates', id);
  return template ? normalizeTemplate(template) : null;
}

async function repairStoredTemplates(){
  const templates = await dbAll('templates');
  let repaired = 0;

  for(const original of templates){
    const normalized = normalizeTemplate(original);
    const originalCount = Array.isArray(original?.items) ? original.items.length : 0;
    const needsRepair = !Array.isArray(original?.items)
      || originalCount !== normalized.items.length
      || !Array.isArray(original?.sections)
      || !original?.name;

    if(needsRepair && normalized.id && normalized.items.length){
      await dbPut('templates', normalized);
      repaired += 1;
    }
  }

  if(repaired > 0) appLog(`점검표 호환 보정 완료: ${repaired}건`);
  return repaired;
}

// ═══════════════════════════════════════════════
//  자동 점검표 동기화 (GitHub Contents API 폴더 스캔 기준)
//  - 관리자는 GitHub checklists 폴더에 Excel을 추가/교체한다.
//  - 앱은 GitHub Contents API로 checklists 폴더를 조회한다.
//  - .xlsx/.xls 파일만 자동 동기화한다.
//  - GitHub SHA를 기준으로 변경된 파일만 IndexedDB에 반영한다.
//  - 기존 심사 데이터는 수정하지 않고, 새 심사부터 최신 점검표를 사용한다.
// ═══════════════════════════════════════════════
const CHECKLIST_FOLDER_PATH = 'checklists';
const GITHUB_BRANCH = 'main';

function getGitHubRepoInfo(){
  const host = location.hostname;
  const pathParts = location.pathname.split('/').filter(Boolean);

  if(host.endsWith('.github.io') && pathParts.length > 0){
    return {
      owner: host.replace('.github.io', ''),
      repo: pathParts[0],
      branch: GITHUB_BRANCH
    };
  }

  // 로컬 테스트 또는 커스텀 도메인에서는 아래 값을 필요 시 직접 수정한다.
  return {
    owner: 'tt170019-bot',
    repo: 'audit-app',
    branch: GITHUB_BRANCH
  };
}

async function loadChecklistIndex(){
  const repo = getGitHubRepoInfo();

  try{
    const index = await ChecklistSource.loadGitHubIndex({...repo, folderPath:CHECKLIST_FOLDER_PATH});
    checklistSyncState = { checked: true, reachable: true, message: 'GitHub 점검표 서버 접근 가능' };
    return index;
  } catch(e){
    checklistSyncState = { checked: true, reachable: false, message: '온라인 상태와 별개로 GitHub 점검표 서버 접근 실패' };
    appWarn('GitHub checklists 폴더 조회 실패. 저장된 점검표를 계속 사용합니다.', e);
    return [];
  }
}

// wayfinder #8 — Supabase 익명 읽기. GitHub 자동 동기화와 나란히 동작하는
// 두 번째 점검표 소스: 로그인 없이 목록을 읽고, 실패해도 기존 저장분은 그대로 둔다.
let supabaseSyncState = { checked: false, reachable: null, message: 'Supabase 점검표 서버 확인 전' };

async function loadSupabaseChecklists(){
  try{
    const client = SupabaseClient.getClient();
    const templates = await ChecklistSource.loadSupabaseTemplates(client);
    supabaseSyncState = { checked: true, reachable: true, message: 'Supabase 점검표 서버 접근 가능' };
    return templates;
  } catch(e){
    supabaseSyncState = { checked: true, reachable: false, message: '온라인 상태와 별개로 Supabase 점검표 서버 접근 실패' };
    appWarn('Supabase templates 조회 실패. 저장된 점검표를 계속 사용합니다.', e);
    return [];
  }
}


function getPresetTemplateKey(cl){
  return `${cl.filename}@@${cl.fingerprint || cl.sha || cl.updatedAt || 'unversioned'}`;
}

function getTemplateVersionLabel(template){
  if(template?.sha) return `SHA ${String(template.sha).slice(0, 7)}`;
  if(template?.updatedAt) return `수정 ${new Date(template.updatedAt).toLocaleDateString('ko-KR')}`;
  if(template?.version) return `v${template.version}`;
  if(template?.importedAt) return `등록 ${new Date(template.importedAt).toLocaleDateString('ko-KR')}`;
  return 'legacy';
}

function getTemplateSourceLabel(template){
  if((template?.source === 'github-api' || template?.source === 'github-index' || template?.source === 'supabase')) return '자동동기화';
  if(template?.source === 'preset') return '자동등록';
  return '수동등록';
}

function sortTemplatesForDisplay(templates){
  return [...templates].sort((a,b)=>{
    const activeA = a.active === false ? 1 : 0;
    const activeB = b.active === false ? 1 : 0;
    if(activeA !== activeB) return activeA - activeB;
    const ai = String(a.importedAt || '');
    const bi = String(b.importedAt || '');
    if(ai !== bi) return bi.localeCompare(ai);
    return String(a.name || '').localeCompare(String(b.name || ''), 'ko');
  });
}

function extractChecklistItemsFromRows(rows){
  const items = [];
  const sections = new Set();

  for(const row of ChecklistSource.extractRows(rows)){
    const normalized = normalizeChecklistItem(row);
    if(!normalized) continue;
    sections.add(normalized.section || '일반');
    items.push(normalized);
  }

  return { items, sections: [...sections] };
}

async function markSupersededTemplates(filename, keepTemplateKey, indexFilenames){
  const existing = await dbAll('templates');
  for(const t of existing){
    if(t.source !== 'github-api' && t.source !== 'github-index' && t.source !== 'preset') continue;
    if(filename && t.filename === filename && t.templateKey !== keepTemplateKey && t.active !== false){
      await dbPut('templates', {...t, active:false, supersededAt:new Date().toISOString()});
    }
    if(!filename && indexFilenames && t.filename && !indexFilenames.has(t.filename) && t.active !== false){
      await dbPut('templates', {...t, active:false, removedFromIndexAt:new Date().toISOString()});
    }
  }
}

async function autoLoadChecklists(){
  const index = await loadChecklistIndex();
  let added = 0;
  let updated = 0;

  if(index.length === 0){
    appLog('동기화할 GitHub 점검표가 없습니다. checklists 폴더를 확인하세요.');
  }

  const indexFilenames = new Set(index.map(cl => cl.filename));
  if(index.length > 0) await markSupersededTemplates(null, null, indexFilenames);

  for(const cl of index){
    const existing = await dbAll('templates');
    const templateKey = getPresetTemplateKey(cl);
    const sameVersion = existing.find(t => t.templateKey === templateKey || (t.filename === cl.filename && t.fingerprint === cl.fingerprint));
    if(sameVersion){
      if(sameVersion.active === false){
        await dbPut('templates', {...sameVersion, active:true, restoredAt:new Date().toISOString()});
      }
      continue;
    }

    try{
      const res = await fetch(`${cl.path}?sha=${encodeURIComponent(cl.fingerprint)}&ts=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) throw new Error(`${cl.path} HTTP ${res.status}`);

      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const parsed = extractChecklistItemsFromRows(rows);
      if(parsed.items.length===0) throw new Error('점검 항목을 찾을 수 없습니다. Excel 컬럼 형식을 확인하세요.');

      await markSupersededTemplates(cl.filename, templateKey, null);
      await dbPut('templates', {
        name: cl.name,
        filename: cl.filename,
        sha: cl.sha || '',
        updatedAt: cl.updatedAt || '',
        fingerprint: cl.fingerprint,
        templateKey,
        source: 'github-api',
        reportTemplate: inferReportTemplateType(cl),
        checklistUiType: getChecklistUiType(cl),
        active: true,
        importedAt: new Date().toISOString(),
        sections: parsed.sections,
        items: parsed.items
      });
      added += 1;
      updated += existing.some(t => t.filename === cl.filename) ? 1 : 0;
      appLog(`점검표 동기화: ${cl.name} ${cl.sha ? cl.sha.slice(0, 7) : cl.updatedAt || ''}`);
    } catch(e){
      appWarn(`점검표 동기화 실패: ${cl.filename}`, e);
    }
  }

  const supabaseTemplates = await loadSupabaseChecklists();
  for(const tpl of supabaseTemplates){
    const existing = await dbAll('templates');
    const sameVersion = existing.find(t => t.templateKey === tpl.templateKey);
    if(sameVersion){
      if(sameVersion.active === false){
        await dbPut('templates', {...sameVersion, active:true, restoredAt:new Date().toISOString()});
      }
      continue;
    }

    const stale = existing.filter(t => t.source === 'supabase' && t.supabaseId === tpl.supabaseId && t.templateKey !== tpl.templateKey && t.active !== false);
    for(const s of stale) await dbPut('templates', {...s, active:false, supersededAt:new Date().toISOString()});

    await dbPut('templates', {
      ...tpl,
      reportTemplate: inferReportTemplateType(tpl),
      active: true,
      importedAt: new Date().toISOString()
    });
    added += 1;
    updated += stale.length > 0 ? 1 : 0;
    appLog(`Supabase 점검표 동기화: ${tpl.name} (${tpl.supabaseId})`);
  }

  if(added > 0){
    showToast(updated > 0 ? `점검표 ${updated}건 업데이트됨` : `점검표 ${added}건 동기화됨`);
    if(currentTab === 'templates'){
      const c = document.getElementById('content');
      if(c) renderTemplates(c);
    }
  }
  return added;
}

function updateOnlineTag(){
  const tag = byId('offline-tag');
  if(!tag) return Promise.resolve(false);

  if(!navigator.onLine){
    tag.textContent = 'OFFLINE';
    tag.classList.add(UI_CLASS.OFFLINE);
    tag.classList.remove(UI_CLASS.ONLINE);
    return Promise.resolve(false);
  }

  const pingUrl = `./index.html?online-check=${Date.now()}`;

  return fetch(pingUrl, { method:'GET', cache:'no-store' })
    .then(res => {
      if(!res.ok) throw new Error(`online check failed: ${res.status}`);
      tag.textContent = 'ONLINE';
      tag.classList.add(UI_CLASS.ONLINE);
      tag.classList.remove(UI_CLASS.OFFLINE);
      return true;
    })
    .catch(() => {
      tag.textContent = 'OFFLINE';
      tag.classList.add(UI_CLASS.OFFLINE);
      tag.classList.remove(UI_CLASS.ONLINE);
      return false;
    });
}

function switchTab(tab, event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }

  currentTab = tab;
  document.querySelectorAll('.tab-btn, .desktop-nav-btn').forEach(b=>{
    b.classList.toggle(UI_CLASS.ACTIVE, b.dataset.tab===tab);
  });

  const action = byId('topbar-action');
  setHidden(action, true);
  if(tab !== 'checklist') currentAudit = null;

  // Tab changes are in-app view changes, not page navigation.
  // Reset only the app content scroll so the browser viewport does not jump.
  const content = byId('content');
  if(content) content.scrollTop = 0;

  Promise.resolve(renderTab(tab)).finally(() => {
    const refreshedContent = byId('content');
    if(refreshedContent) refreshedContent.scrollTop = 0;
  });
}

async function renderTab(tab){
  const c = document.getElementById('content');
  c.classList.toggle('web-content', ['home','audits','templates','export'].includes(tab));
  document.getElementById('topbar-title').textContent = '심사 점검표';
  if(tab==='home') await renderHome(c);
  else if(tab==='audits') await renderAudits(c);
  else if(tab==='templates') await renderTemplates(c);
  else if(tab==='export') await renderExport(c);
}


// ═══════════════════════════════════════════════
//  Audit summary helpers
//  - Centralizes repeated YES/NO/OBS/N/A and completion calculations.
//  - Keeps one-file delivery while reducing render/export duplication.
// ═══════════════════════════════════════════════
function getAuditItems(audit){
  return Array.isArray(audit?.items) ? audit.items : [];
}

function countAuditResult(items, resultValue){
  return items.filter(item => normalizeResultValue(item.result) === resultValue).length;
}

function getAuditSummary(audit){
  const items = getAuditItems(audit);
  const total = items.length;
  const answered = items.filter(item => item.result).length;
  const yes = countAuditResult(items, RESULT_VALUE.YES);
  const no = countAuditResult(items, RESULT_VALUE.NO);
  const obs = countAuditResult(items, RESULT_VALUE.OBS);
  const na = countAuditResult(items, RESULT_VALUE.NA);
  const percent = total ? Math.round(answered / total * 100) : 0;

  return {
    total,
    answered,
    percent,
    ok: yes,
    yes,
    ng: no,
    no,
    obs,
    na
  };
}

function getSectionCompletion(items){
  const safeItems = Array.isArray(items) ? items : [];
  return {
    total: safeItems.length,
    answered: safeItems.filter(item => item.result).length
  };
}

function getResultPercent(count, total){
  return total ? `${Math.round(count / total * 100)}%` : '';
}

async function updateStorageStatus(){
  const status = document.getElementById('storage-status');
  if(!status) return;
  if(!navigator.storage?.estimate){
    status.textContent = '이 브라우저는 저장공간 사용량을 제공하지 않습니다. 정기적으로 백업하세요.';
    return;
  }
  try{
    const {usage = 0, quota = 0} = await navigator.storage.estimate();
    if(!quota){
      status.textContent = '저장공간 한도를 확인할 수 없습니다. 정기적으로 백업하세요.';
      return;
    }
    const percent = Math.round(usage / quota * 100);
    const usageMb = (usage / 1024 / 1024).toFixed(1);
    const quotaMb = (quota / 1024 / 1024).toFixed(1);
    status.textContent = `사용량 ${usageMb}MB / ${quotaMb}MB (${percent}%)${percent >= 80 ? ' — 사진을 정리하고 즉시 백업하세요.' : ''}`;
  } catch(e){
    appWarn('저장공간 확인 실패:', e);
    status.textContent = '저장공간을 확인할 수 없습니다. 정기적으로 백업하세요.';
  }
}

function syncDetailStickyOffset(){
  const shell = document.querySelector('.detail-shell');
  const top = document.querySelector('.detail-top');
  if(!shell || !top) return;
  shell.style.setProperty('--detail-sticky-offset', `${Math.ceil(top.getBoundingClientRect().height)}px`);
}

window.addEventListener('resize', () => {
  if(currentAudit) syncDetailStickyOffset();
});

function getChecklistScrollContainer(){
  // Return the element that actually owns vertical scrolling.
  // Tablet split view uses .detail-content for layout, but #content or the
  // document can be the real scroll container depending on viewport/browser.
  const candidates = [
    document.querySelector('.detail-content'),
    byId('content'),
    document.scrollingElement,
    document.documentElement
  ].filter(Boolean);

  return candidates.find(el => el.scrollHeight > el.clientHeight + 1)
    || byId('content')
    || document.scrollingElement
    || document.documentElement;
}

function getElementTopInScroller(el, scroller){
  const scrollerRect = scroller.getBoundingClientRect
    ? scroller.getBoundingClientRect()
    : { top: 0 };
  const elRect = el.getBoundingClientRect();
  return scroller.scrollTop + elRect.top - scrollerRect.top;
}

function getSectionAlignmentOffset(scroller){
  // Use the first section's natural top position as the alignment baseline.
  // This keeps click-jump placement identical to the first section's initial placement
  // without hard-coding sticky header or progress-bar heights.
  const firstSection = document.querySelector('.detail-section-start');
  if(!scroller || !firstSection) return 0;
  return getElementTopInScroller(firstSection, scroller);
}

function scrollToAlignedTarget(target, options = {}){
  syncDetailStickyOffset();
  const scroller = getChecklistScrollContainer();
  if(!scroller || !target) return;

  const alignmentOffset = getSectionAlignmentOffset(scroller);
  const targetTop = getElementTopInScroller(target, scroller);
  const destination = targetTop - alignmentOffset + (options.offset || 0);

  scroller.scrollTo({
    top: Math.max(0, destination),
    behavior: options.behavior || 'smooth'
  });
}

function scrollToChecklistSection(sectionId){
  const target = document.getElementById(sectionId);
  const index = Number(String(sectionId).replace('sec-', ''));

  if(Number.isFinite(index)) setCurrentSectionChip(index, true);
  scrollToAlignedTarget(target);
}

function getSectionIndexForItemIndex(itemIndex){
  const item = currentAudit?.items?.[itemIndex];
  if(!item) return -1;

  const sectionNames = [];
  (currentAudit.items || []).forEach(checkItem => {
    const sectionName = checkItem.section || '일반';
    if(!sectionNames.includes(sectionName)) sectionNames.push(sectionName);
  });

  return sectionNames.indexOf(item.section || '일반');
}

function scrollToChecklistItem(itemIndex){
  const el = document.getElementById('ci-' + itemIndex);
  if(!el) return;

  const body = document.getElementById('cb-' + itemIndex);
  if(body) body.classList.remove('hidden');

  const sectionIndex = getSectionIndexForItemIndex(itemIndex);
  if(sectionIndex >= 0) setCurrentSectionChip(sectionIndex, true);

  // Align incomplete-item jumps with section navigation instead of centering the card.
  // Add a 3px destination correction so the card border does not sit on the sticky boundary.
  scrollToAlignedTarget(el, { offset: 3 });
}

  const isLegacyScale = scale.labels.length === AuditRules.MATURITY_LEVELS.length

function getSectionNavState(secItems){

  // Keep section chips visually neutral regardless of YES/NO/OBS/N/A results.
  const completion = getSectionCompletion(secItems);
  return { ...completion, className: 'is-neutral' };
}

function getSectionChipLabel(sectionName){
  // Section headers often include an ordinal prefix such as "5. 지상 조업".
  // The chip already communicates position through horizontal order, so remove
  // the prefix to reduce numeric noise while keeping the original section title below.
  return String(sectionName || '').replace(/^\s*\d+\s*[.)]\s*/, '').trim() || String(sectionName || '일반');

function renderSectionAnchorChip(sectionName, secItems, sectionIndex, idPrefix = 'nav-sec-'){
  const state = getSectionNavState(secItems);

function renderPendingAnchorChip(audit){

let sectionChipScrollHandler = null;
let sectionChipScrollFrame = null;
let currentSectionChipIndex = -1;

function getCurrentChecklistSectionIndex(){
  const headers = [...document.querySelectorAll('.detail-section-start')];
  const scroller = getChecklistScrollContainer();
  if(headers.length === 0 || !scroller) return -1;

  const alignmentOffset = getSectionAlignmentOffset(scroller);
  const activeLine = scroller.scrollTop + alignmentOffset + 1;
  let currentIndex = 0;

  headers.forEach((header, index) => {
    if(getElementTopInScroller(header, scroller) <= activeLine) currentIndex = index;
  });

  return currentIndex;
}

function setCurrentSectionChip(index, shouldAlignStart = true){
  if(index < 0) return;
  const indexChanged = index !== currentSectionChipIndex;
  currentSectionChipIndex = index;

  document.querySelectorAll('.detail-anchor-nav .anchor-chip, .detail-sidebar .anchor-chip').forEach(chip => {
    chip.classList.remove('is-current');
  });

  const activeChips = [
    document.getElementById('nav-mobile-' + index),
    document.getElementById('nav-side-' + index)
  ].filter(Boolean);

  if(activeChips.length === 0) return;
  activeChips.forEach(chip => chip.classList.add('is-current'));

  if(shouldAlignStart && indexChanged){
    activeChips.forEach(chip => chip.scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'}));
  }
}

function updateCurrentSectionChip(shouldAlignStart = true){
  setCurrentSectionChip(getCurrentChecklistSectionIndex(), shouldAlignStart);
}

let sectionChipScrollContainer = null;

function setupSectionChipTracking(){
  const scroller = getChecklistScrollContainer();
  if(!scroller) return;

  if(sectionChipScrollHandler && sectionChipScrollContainer){
    sectionChipScrollContainer.removeEventListener('scroll', sectionChipScrollHandler);
  }

  currentSectionChipIndex = -1;
  sectionChipScrollContainer = scroller;
  sectionChipScrollHandler = () => {
    if(sectionChipScrollFrame) return;
    sectionChipScrollFrame = requestAnimationFrame(() => {
      sectionChipScrollFrame = null;
      updateCurrentSectionChip(true);
    });
  };

  scroller.addEventListener('scroll', sectionChipScrollHandler, {passive:true});
  requestAnimationFrame(() => updateCurrentSectionChip(false));
}

function openSectionSheet(){
  const modal = byId('modal-sections');
  if(modal && !modal.dataset.backdropBound){
    modal.addEventListener('click', event => {
      if(event.target === modal) closeModal('modal-sections');
    });
    modal.dataset.backdropBound = '1';
  }

  updateCurrentSectionChip(false);
  document.querySelectorAll('#modal-sections .section-sheet-item[data-section-index]').forEach(item => {
    item.classList.toggle('is-current', Number(item.dataset.sectionIndex) === currentSectionChipIndex);
  });
  openModal('modal-sections');
}

function goToSectionFromSheet(sectionIndex){
  closeModal('modal-sections');
  requestAnimationFrame(() => scrollToChecklistSection(`sec-${sectionIndex}`));
}

function jumpToPendingFromSheet(auditId){
  closeModal('modal-sections');
  requestAnimationFrame(() => jumpToNext(auditId));
}

  <div class="detail-shell">
    <div class="detail-top">
      <div class="detail-top-row">

        <div class="detail-title-wrap">

          <div class="detail-meta">${esc(audit.auditor||'심사원 미입력')} · ${esc(audit.dept||'부서 미입력')} · ${esc(audit.date||'일자 미입력')}</div>
        </div>
        <span class="badge ${audit.status===AUDIT_STATUS.DONE?'badge-ok':'badge-obs'}">${audit.status===AUDIT_STATUS.DONE?'완료':'진행 중'}</span>
      </div>
      <div class="detail-progress">

          <div class="result-count-row detail-result-counts">
            <span class="badge badge-ok">YES ${summary.yes}</span>
            <span class="badge badge-ng">NO ${summary.no}</span>
            <span class="badge badge-na">N/A ${summary.na}</span>
            <span class="badge badge-obs">OBS ${summary.obs}</span>
          </div>
        </div>
        <div class="prog-wrap detail-prog-wrap"><div class="prog-fill" style="width:${summary.percent}%"></div></div>
        <div class="checklist-filter-row">
          ${[['all','전체'],['pending','미완료'],['NO','NO'],['OBS','OBS']].map(([value,label])=>`<button type="button" class="anchor-chip ${checklistFilter===value ? 'is-current' : ''}" aria-pressed="${checklistFilter===value ? 'true' : 'false'}" onclick="setChecklistFilter('${value}')">${label}</button>`).join('')}

              <span class="detail-section-title">${esc(sec)}</span>
              <span class="check-section-summary check-section-summary-inline">${getSectionCompletion(secItems).answered}/${getSectionCompletion(secItems).total}</span>

function toggleCheckItem(idx){
  const body = document.getElementById('cb-'+idx);
  if(!body) return;
  body.classList.toggle('hidden');
}

function preserveDetailScroll(previousScrollTop, openIdx, anchorTopBefore = null){
  const restore = () => {
    const c = getChecklistScrollContainer();
    const card = document.getElementById('ci-'+openIdx);
    const body = document.getElementById('cb-'+openIdx);
    if(body) body.classList.remove('hidden');

    if(!c) return;

    // Result/Maturity selection is an in-place edit.
    // Keep the tapped card at the same viewport position after full re-render.
    // This avoids the mobile browser's focus/scroll correction from making the page jump.
    if(typeof anchorTopBefore === 'number' && card){
      const anchorTopAfter = card.getBoundingClientRect().top;
      c.scrollTop += anchorTopAfter - anchorTopBefore;
    } else {
      c.scrollTop = previousScrollTop;
    }
  };

  restore();
  requestAnimationFrame(() => {
    restore();
    requestAnimationFrame(restore);
  });
  setTimeout(restore, 80);
  setTimeout(restore, 180);
}

function stopInputScrollJump(event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }
  if(document.activeElement && typeof document.activeElement.blur === 'function'){
    document.activeElement.blur();
  }
}

async function setMaturityResult(auditId, idx, maturity, event){
  stopInputScrollJump(event);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit) return;
    if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
    applyPendingNotesToAudit(audit);

    const content = getChecklistScrollContainer();
    const anchorCard = document.getElementById('ci-'+idx);
    const previousScrollTop = content ? content.scrollTop : 0;
    const anchorTopBefore = anchorCard ? anchorCard.getBoundingClientRect().top : null;

    audit.items[idx].maturity = maturity;
    currentAudit = audit;
    await dbPut('audits', audit);

    renderChecklist(audit);
    preserveDetailScroll(previousScrollTop, idx, anchorTopBefore);
    showToast('성숙도 수준이 저장되었습니다');
  });
}

async function setResult(auditId, idx, result, event){
  stopInputScrollJump(event);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit) return;
    if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
    applyPendingNotesToAudit(audit);

    const content = getChecklistScrollContainer();
    const anchorCard = document.getElementById('ci-'+idx);
    const previousScrollTop = content ? content.scrollTop : 0;
    const anchorTopBefore = anchorCard ? anchorCard.getBoundingClientRect().top : null;

    const wasAnswered = !!audit.items[idx].result;
    audit.items[idx].result = normalizeResultValue(result);
    currentAudit = audit;
    await dbPut('audits', audit);

    renderChecklist(audit);
    preserveDetailScroll(previousScrollTop, idx, anchorTopBefore);
    if(!wasAnswered && result) showToast('저장되었습니다');
  });
}

const noteSaveTimers = new Map();
const pendingNoteValues = new Map();
const auditWriteQueues = new Map();

function enqueueAuditWrite(auditId, write){
  const previous = auditWriteQueues.get(auditId) || Promise.resolve();
  const next = previous.catch(() => {}).then(write);
  const settled = next.finally(() => {
    if(auditWriteQueues.get(auditId) === settled) auditWriteQueues.delete(auditId);
  });
  auditWriteQueues.set(auditId, settled);
  return next;
}

function setChecklistFilter(value){
  checklistFilter = value;
  if(currentAudit) renderChecklist(currentAudit);
}

function waitForAuditWrites(auditId){
  return auditWriteQueues.get(auditId) || Promise.resolve();
}

function clearPendingNoteWrites(){
  for(const timer of noteSaveTimers.values()) clearTimeout(timer);
  noteSaveTimers.clear();
  pendingNoteValues.clear();
}

function getNoteSaveKey(auditId, idx){
  return `${auditId}:${idx}`;
}

function getPendingNoteValue(auditId, idx, fallback = ''){
  const key = getNoteSaveKey(auditId, idx);
  return pendingNoteValues.has(key) ? pendingNoteValues.get(key) : fallback;
}

function applyPendingNotesToAudit(audit){
  if(!audit?.id || !Array.isArray(audit.items)) return audit;
  audit.items.forEach((item, idx) => {
    const key = getNoteSaveKey(audit.id, idx);
    if(pendingNoteValues.has(key)) item.note = pendingNoteValues.get(key);
  });
  return audit;
}

function scheduleNoteSave(auditId, idx, note){
  if(currentAudit?.id === auditId && currentAudit.status === AUDIT_STATUS.DONE){
    showToast('완료된 심사는 다시 열어야 수정할 수 있습니다');
    return;
  }
  const key = getNoteSaveKey(auditId, idx);
  pendingNoteValues.set(key, note);

  if(currentAudit?.id === auditId && currentAudit.items?.[idx]){
    currentAudit.items[idx].note = note;
  }

  clearTimeout(noteSaveTimers.get(key));
  noteSaveTimers.set(key, setTimeout(() => persistNoteValue(auditId, idx), 400));
}

async function persistNoteValue(auditId, idx){
  const key = getNoteSaveKey(auditId, idx);
  const note = pendingNoteValues.get(key);
  if(note === undefined) return;

  noteSaveTimers.delete(key);
  return enqueueAuditWrite(auditId, async () => {
    const audit = await dbGet('audits', auditId);
    if(!audit?.items?.[idx] || audit.status === AUDIT_STATUS.DONE) return;
    audit.items[idx].note = note;
    await dbPut('audits', audit);
    if(currentAudit?.id === auditId && currentAudit.items?.[idx]) currentAudit.items[idx].note = note;
    if(pendingNoteValues.get(key) === note) pendingNoteValues.delete(key);
  });
}

function flushNoteSave(auditId, idx){
  const key = getNoteSaveKey(auditId, idx);
  clearTimeout(noteSaveTimers.get(key));
  noteSaveTimers.delete(key);
  return persistNoteValue(auditId, idx);
}

async function deleteAudit(id, event){
  event?.stopPropagation();
  const audit = await dbGet('audits', id);
  if(!audit) return;
  if(!confirm(`"${audit.title}" 심사 기록과 첨부 사진을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
  await dbDelete('audits', id);
  if(currentAudit?.id === id) currentAudit = null;
  showToast('심사 기록을 삭제했습니다');
  switchTab('audits');
}

async function flushPendingNotesForAudit(auditId){
  const indices = [...pendingNoteValues.keys()]
    .filter(key => key.startsWith(`${auditId}:`))
    .map(key => Number(key.slice(String(auditId).length + 1)));
  for(const idx of indices) await flushNoteSave(auditId, idx);
}

function jumpToNext(auditId){
  const items = currentAudit?.items||[];
  const nextIdx = items.findIndex(i=>!i.result);
  if(nextIdx<0){ showToast('모든 항목이 완료되었습니다 ✓'); return; }
  scrollToChecklistItem(nextIdx);
}

async function finishAudit(id){
  await flushPendingNotesForAudit(id);
  await waitForAuditWrites(id);
  const audit = await dbGet('audits', id);
  if(!audit) return;
  if(audit.status === AUDIT_STATUS.DONE){ showToast('이미 완료된 심사입니다'); return; }
  const unanswered = audit.items?.filter(i=>!i.result).length||0;
  if(!AuditRules.canCompleteAudit(audit)){
    showToast(`미완료 항목 ${unanswered}개를 입력해야 심사를 완료할 수 있습니다`);
    jumpToNext(id);
    return;
  }
  audit.status=AUDIT_STATUS.DONE;
  await dbPut('audits', audit);
  showToast('심사가 완료되었습니다');
  backFromChecklist();
}

async function reopenAudit(id){
  const audit = await dbGet('audits', id);
  if(!audit || audit.status !== AUDIT_STATUS.DONE) return;
  if(!confirm('완료 상태를 해제하고 심사를 다시 수정하시겠습니까?')) return;
  audit.status = AUDIT_STATUS.PROGRESS;
  audit.reopenedAt = new Date().toISOString();
  await dbPut('audits', audit);
  currentAudit = audit;
  renderChecklist(audit);
  showToast('심사를 다시 열었습니다');
}

function backFromChecklist(){
  setVisible('topbar', true);
  setVisible('tabbar', true);
  setHidden('topbar-action', true);
  currentAudit=null;
  switchTab('audits');
}

async function openNewAuditModal(){
  const templates = sortTemplatesForDisplay((await getNormalizedTemplates()).filter(t => t.active !== false));
  const sel = document.getElementById('na-template');
  sel.innerHTML='<option value="">— 점검표를 선택하세요 —</option>'+
    templates.map(t=>`<option value="${t.id}" ${t.items.length ? '' : 'disabled'}>${esc(t.name)} · ${esc(getTemplateVersionLabel(t))}${t.items.length ? '' : ' (항목 없음)'}</option>`).join('');
  document.getElementById('na-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('na-title').value='';
  document.getElementById('na-auditor').value='';
  document.getElementById('na-dept').value='';
  openModal('modal-newaudit');
}

async function createAudit(){
  const title = document.getElementById('na-title').value.trim();
  const tplId = parseInt(document.getElementById('na-template').value);
  const date  = document.getElementById('na-date').value;
  const auditor = document.getElementById('na-auditor').value.trim();
  const dept  = document.getElementById('na-dept').value.trim();

  if(!title){ showToast('심사 제목을 입력하세요'); return; }
  if(!tplId){ showToast('점검표를 선택하세요'); return; }

  const tpl = await getNormalizedTemplate(tplId);
  if(!tpl){ showToast('점검표를 불러올 수 없습니다'); return; }
  if(!tpl.items.length){ showToast('점검표 항목 형식이 맞지 않습니다. 다시 업로드하세요'); return; }

  const maturityScale = tpl.maturityScale || deriveMaturityScale(tpl);
  const audit = {
    title, date, auditor, dept,
    templateId: tplId,
    templateName: tpl.name || '',
    templateVersion: getTemplateVersionLabel(tpl),
    checklistUiType: tpl.checklistUiType || getChecklistUiType(tpl),
    reportTemplate: tpl.reportTemplate || inferReportTemplateType(tpl),
    maturityScale,
    status: AUDIT_STATUS.PROGRESS,
    createdAt: new Date().toISOString(),
    items: tpl.items.map(i=>({...i, result:null, note:'', photos:[], maturityOn: i.maturityOn ?? Boolean(maturityScale)}))
  };
  const id = await dbPut('audits', audit);
  closeModal('modal-newaudit');
  audit.id = id;
  showToast('심사가 시작되었습니다');
  openAudit(id);
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone')?.classList.remove('drag');
  const file = e.dataTransfer?.files[0];
  if(file) handleFileSelect(file);
}

function handleFileSelect(file){
  if(!file) return;
  if(!getRegistrantSession()?.user){ showToast('점검표를 등록하려면 먼저 로그인하세요'); return; }
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls'].includes(ext)){ showToast('Excel 파일(.xlsx)만 지원합니다'); return; }

  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // Skip header row
      const items=[], sections=new Set();
      for(let i=1;i<rows.length;i++){
        const [section,ref,question,refStd,externalRef,conformityCriteria,establishedCriteria,matureCriteria,leadingCriteria,type] = rows[i];
        if(!question) continue;
        sections.add(section||'일반');
        items.push(normalizeChecklistItem({
          section: section||'일반',
          ref,
          question,
          refStd,
          externalRef,
          conformityCriteria,
          establishedCriteria,
          matureCriteria,
          leadingCriteria,
          type: type || 'YES/NO/OBS/N/A'
        }));
      }
      if(items.length===0){ showToast('항목을 찾을 수 없습니다. 형식을 확인하세요'); return; }

      openReviewWizard({
        mode: 'new',
        name: file.name.replace(/\.[^.]+$/,''),
        filename: file.name,
        sections: [...sections],
        items,
        scaleName: '성숙도 등급',
        labels: [...AuditRules.MATURITY_LEVELS]
      });
    } catch(err){
      showToast('파일을 읽을 수 없습니다: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}


const BACKUP_FORMAT = 'audit-app-backup';
const BACKUP_VERSION = 1;

async function exportLocalBackup(){
  const [audits, templates] = await Promise.all([dbAll('audits'), dbAll('templates')]);
  const backup = {
    format: BACKUP_FORMAT,
    version: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    audits,
    templates
  };
  const blob = new Blob([JSON.stringify(backup)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `audit-app-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`백업 완료: 심사 ${audits.length}건, 점검표 ${templates.length}건`);
}

function selectLocalBackup(){
  document.getElementById('file-backup')?.click();
}

function isValidBackup(backup){
  return backup && backup.format === BACKUP_FORMAT && backup.version === BACKUP_VERSION &&
    Array.isArray(backup.audits) && Array.isArray(backup.templates) &&
    backup.audits.every(audit => audit && typeof audit === 'object' && Array.isArray(audit.items)) &&
    backup.templates.every(template => template && typeof template === 'object' && Array.isArray(template.items));
}

function restoreLocalBackup(backup){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['audits', 'templates'], 'readwrite');
    const audits = tx.objectStore('audits');
    const templates = tx.objectStore('templates');
    audits.clear();
    templates.clear();
    backup.templates.forEach(template => templates.put(template));
    backup.audits.forEach(audit => audits.put(audit));
    tx.oncomplete = () => resolve();
    tx.onabort = tx.onerror = () => reject(tx.error || new Error('저장소에 백업 데이터를 기록할 수 없습니다.'));
  });
}

function handleLocalBackupFile(file){
  if(!file) return;
  const input = document.getElementById('file-backup');
  if(input) input.value = '';
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const backup = JSON.parse(String(e.target.result || ''));
      if(!isValidBackup(backup)) throw new Error('지원하지 않는 백업 파일입니다.');
      const first = confirm(`백업 파일에는 심사 ${backup.audits.length}건, 점검표 ${backup.templates.length}건이 있습니다. 현재 기기 데이터를 모두 교체하시겠습니까?`);
      if(!first) return;
      const second = confirm('현재 기기의 심사 기록, 사진, 점검표가 모두 삭제되고 백업 파일로 교체됩니다. 계속하시겠습니까?');
      if(!second) return;
      clearPendingNoteWrites();
      await Promise.all([...auditWriteQueues.values()]);
      await restoreLocalBackup(backup);
      currentAudit = null;
      pendingPhotos = [];
      showToast('백업 데이터를 복원했습니다');
      switchTab('home');
    } catch(err){
      appError('백업 복원 실패:', err);
      showToast(err.message || '백업 파일을 복원할 수 없습니다');
    }
  };
  reader.readAsText(file, 'utf-8');
}


async function resetAuditData(){
  if(!isAdminMode()){ showToast('관리자 모드에서만 초기화할 수 있습니다'); return; }
  const ok = confirm('이 기기에 저장된 모든 심사 기록과 사진을 삭제합니다. 점검표는 유지됩니다. 계속하시겠습니까?');
  if(!ok) return;
  await dbClear('audits');
  currentAudit = null;
  showToast('심사 기록이 삭제되었습니다');
  switchTab('home');
}

async function resetTemplateData(){
  if(!isAdminMode()){ showToast('관리자 모드에서만 초기화할 수 있습니다'); return; }
  const ok = confirm('이 기기에 저장된 모든 점검표를 삭제합니다. 기존 심사 기록은 유지됩니다. 계속하시겠습니까?');
  if(!ok) return;
  await dbClear('templates');
  showToast('점검표가 삭제되었습니다');
  if(await updateOnlineTag()){
    try{
      await autoLoadChecklists();
      showToast('공식 점검표를 다시 동기화했습니다');
    } catch(err){
      appWarn('점검표 재동기화 실패:', err);
      showToast('점검표 삭제 완료. 재동기화는 나중에 실행하세요');
    }
  }
  switchTab('templates');
}

async function resetAllLocalData(){
  if(!isAdminMode()){ showToast('관리자 모드에서만 초기화할 수 있습니다'); return; }
  const first = confirm('이 기기의 모든 심사 기록, 사진, 점검표를 삭제합니다. 이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?');
  if(!first) return;
  const second = confirm('정말 전체 로컬 데이터를 삭제하시겠습니까?');
  if(!second) return;
  await Promise.all([dbClear('audits'), dbClear('templates')]);
  currentAudit = null;
  pendingPhotos = [];
  showToast('전체 로컬 데이터가 삭제되었습니다');
  if(await updateOnlineTag()){
    try{
      await autoLoadChecklists();
    } catch(err){
      appWarn('전체 초기화 후 점검표 재동기화 실패:', err);
    }
  }
  switchTab('home');
}

async function deleteTemplate(id, e){
  e.stopPropagation();
  if(!isAdminMode()){ showToast('관리자 모드에서만 삭제할 수 있습니다'); return; }
  if(!confirm('이 점검표를 삭제하시겠습니까?')) return;
  await dbDelete('templates', id);
  showToast('삭제되었습니다');
  switchTab('templates');
}

// ═══════════════════════════════════════════════
//  Photo
// ═══════════════════════════════════════════════
function openPhotoModal(auditId, itemIdx){
  currentPhotoTarget = {auditId, itemIdx};
  pendingPhotos = [...(currentAudit?.items[itemIdx]?.photos||[])];
  renderPhotoPreview();
  openModal('modal-photo');
}

function renderPhotoPreview(){
  const area = document.getElementById('photo-preview-area');
  if(!area) return;
  area.innerHTML = pendingPhotos.map((p,i)=>`
    <div class="photo-frame">
      <img class="photo-thumb" src="${p}" alt="사진">
      <button type="button" onclick="pendingPhotos.splice(${i},1);renderPhotoPreview()" class="photo-remove" aria-label="첨부 사진 ${i + 1} 삭제">✕</button>
    </div>`).join('');
}

function takePhoto(){
  document.getElementById('file-camera').click();
  document.getElementById('file-camera').onchange = e=>{
    handleImageFile(e.target.files[0]);
    e.target.value='';
  };
}
function pickPhoto(){
  document.getElementById('file-gallery').click();
  document.getElementById('file-gallery').onchange = e=>{
    handleImageFile(e.target.files[0]);
    e.target.value='';
  };
}
function handleImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload=e=>{
    // Resize to max 800px for storage
    const img = new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhotos.push(canvas.toDataURL('image/jpeg',0.75));
      renderPhotoPreview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function savePhoto(){
  if(!currentPhotoTarget) return;
  const {auditId, itemIdx} = currentPhotoTarget;
  const audit = await dbGet('audits', auditId);
  if(!audit) return;
  if(audit.status === AUDIT_STATUS.DONE){ showToast('완료된 심사는 다시 열어야 수정할 수 있습니다'); return; }
  audit.items[itemIdx].photos = [...pendingPhotos];
  currentAudit = audit;
  await dbPut('audits', audit);
  // Refresh photos in UI
  const area = document.getElementById('photos-'+itemIdx);
  if(area){
    area.innerHTML = pendingPhotos.map(p=>`<img class="photo-thumb photo-thumb-clickable" src="${p}" onclick="viewPhoto('${p}')" alt="사진">`).join('')+
      `<div class="photo-add" onclick="openPhotoModal(${auditId},${itemIdx})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="4"/><path d="M5 7H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V9a2 2 0 00-2-2h-2l-2-3H9L7 7z"/></svg>
        <span>추가</span>
      </div>`;
  }
  closeModal('modal-photo');
  showToast(`사진 ${pendingPhotos.length}장 저장됨`);
}

function viewPhoto(src){
  const d=document.createElement('div');
  d.className = 'viewer';
  d.innerHTML=`<img src="${src}" alt="첨부 사진 확대"><button type="button" class="viewer-close" onclick="this.parentNode.remove()" aria-label="닫기">✕</button>`;
  document.body.appendChild(d);
}



// ═══════════════════════════════════════════════
//  Modal helpers
// ═══════════════════════════════════════════════
function openModal(id){
  const modal = byId(id);
  if(!modal) return;
  modal.classList.add(UI_CLASS.OPEN);
  document.body.style.overflow='hidden';
}
function closeModal(id){
  const modal = byId(id);
  if(!modal) return;
  modal.classList.remove(UI_CLASS.OPEN);
  document.body.style.overflow='';
}
// Close modal on backdrop tap
document.querySelectorAll('.modal-backdrop').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) closeModal(m.id); });
});

window.addEventListener('keydown', e => {
  if(e.key !== 'Escape') return;
  const openModalEl = document.querySelector('.modal-backdrop.' + UI_CLASS.OPEN);
  if(openModalEl) closeModal(openModalEl.id);
});

window.addEventListener('popstate', () => {
  if(currentAudit) backFromChecklist();
});

// ═══════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════
let _toastTimer;
function showToast(msg){
  const t = byId('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Local Pretendard note: keep ./fonts/PretendardVariable.woff2 in the deployment
// and include it in sw.js precache/static asset list when offline font rendering is required.
// Service Worker registration
// sw.js uses network-first caching, so index.html cache version bumps are no longer required.
if('serviceWorker' in navigator){
  let swRefreshing = false;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });

  window.addEventListener('load',()=>{
    const base = location.pathname.replace(/\/[^\/]*$/, '/');
    const swUrl = base + 'sw.js';

    navigator.serviceWorker.register(swUrl, {scope: base})
      .then(reg => {
        appLog('SW registered:', reg.scope);
        reg.update();

        if(reg.waiting && navigator.serviceWorker.controller){
          reg.waiting.postMessage({type:'SKIP_WAITING'});
        }

        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if(!worker) return;
          worker.addEventListener('statechange', () => {
            if(worker.state === 'installed' && navigator.serviceWorker.controller){
              showToast('새 버전을 적용합니다');
              worker.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
      })
      .catch(e => appWarn('SW error:', e));
  });
}
