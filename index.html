<style>
:root {
  /* Atlassian Design MD manual tokens */
  --ads-text: #292A2E;
  --ads-text-subtle: #505258;
  --ads-text-subtlest: #6B6E76;

  --ads-surface-overlay: #FFFFFF;
  --ads-border: #DCDfe4;
  --ads-border-bold: #8590A2;
  --ads-border-input: #8590A2;
  --ads-border-focused: #388BFF;
  --ads-brand: #1868DB;
  --ads-brand-hovered: #1558BC;
  --ads-brand-pressed: #0C418D;
  --ads-danger: #C9372C;
  --ads-danger-bg: #FFECEB;
  --ads-danger-text: #AE2E24;

  --ads-warning-bold: #F5CD47;
  --ads-warning-text: #7F5F01;
  --ads-success-bg: #DCFFF1;

  --ads-success-text: #216E4E;
  --ads-information-bg: #E9F2FF;
  --ads-information-bold: #1868DB;
  --ads-information-text: #1558BC;
  --ads-neutral-bg: #F1F2F4;
  --ads-neutral-bold: #626F86;
  --ads-neutral-text: #44546F;

  --font-family-ui: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ads-font-heading: var(--font-family-ui);
  --ads-font-body: var(--font-family-ui);

  --ads-heading-large-size: 1.5rem;
  --ads-heading-large-line: 1.75rem;
  --ads-heading-medium-size: 1.25rem;
  --ads-heading-medium-line: 1.5rem;
  --ads-heading-small-size: 1rem;
  --ads-heading-small-line: 1.25rem;
  --ads-body-size: 0.875rem;
  --ads-body-line: 1.25rem;
  --ads-body-small-size: 0.75rem;
  --ads-body-small-line: 1rem;
  --ads-weight-regular: 400;
  --ads-weight-medium: 500;
  --ads-weight-semibold: 600;
  --ads-weight-bold: 600;

  --space-0: 0rem;
  --space-025: 0.125rem;
  --space-050: 0.25rem;
  --space-075: 0.375rem;
  --space-100: 0.5rem;
  --space-150: 0.75rem;
  --space-200: 1rem;
  --space-250: 1.25rem;
  --space-300: 1.5rem;
  --space-400: 2rem;
  --space-500: 2.5rem;
  --space-600: 3rem;
  --space-800: 4rem;

  --radius-xsmall: 0.125rem;
  --radius-small: 0.25rem;
  --radius-medium: 0.375rem;
  --radius-large: 0.5rem;
  --radius-xlarge: 0.75rem;
  --radius-xxlarge: 1rem;
  --radius-full: 9999px;

  --shadow-raised: 0 1px 1px #1E1F2140, 0 0 1px #1E1F214F;
  --shadow-overlay: 0 8px 12px #1E1F2126, 0 0 1px #1E1F214F;
  --shadow-overflow: 0 0 8px #1E1F2129, 0 0 1px #1E1F211F;

  --ui-button-height: 2.5rem;
  --ui-button-small-height: 2.75rem;
  --ui-button-padding-inline: var(--space-200);
  --ui-button-small-padding-inline: var(--space-150);
  --ui-chip-height: 2rem;
  --ui-chip-padding-inline: var(--space-150);
  --ui-lozenge-height: 1.25rem;
  --ui-lozenge-padding-inline: var(--space-050);
  --ui-field-height: 2.5rem;
  --ui-tabbar-height: 4rem;
  --ui-topbar-height: 3.5rem;
  --ui-progress-height: 0.25rem;
  --ui-photo-size: 4.5rem;
  --touch-target-min: 2.75rem;
  --mobile-action-height: 3.5rem;
  --mobile-card-padding: var(--space-200);
  --mobile-page-padding: var(--space-200);
  --mobile-bottom-safe-area: env(safe-area-inset-bottom);
  --ui-border-width: 0.0625rem;
  --ui-border-width-strong: 0.125rem;

  /* semantic aliases retained for existing JS/style references */
  --navy: var(--ads-surface-sunken);
  --navy2: var(--ads-surface);
  --navy3: var(--ads-surface-container);
  --blue: var(--ads-brand);
  --blue2: var(--ads-border-focused);
  --teal: var(--ads-brand);
  --teal2: var(--ads-information-text);
  --warn: var(--ads-warning-text);
  --danger: var(--ads-danger-text);
  --ok: var(--ads-success-text);
  --text: var(--ads-text);
  --text2: var(--ads-text-subtle);
  --text3: var(--ads-text-subtlest);
  --border: var(--ads-border);
  --border2: var(--ads-border-bold);
  --card: var(--ads-surface);
  --input: var(--ads-surface);
  --radius: var(--radius-large);
  --r2: var(--radius-medium);
}

* { box-sizing: border-box; margin: var(--space-0); padding: var(--space-0); -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--ads-surface-sunken); color: var(--ads-text); font-family: var(--font-family-ui); font-size: var(--ads-body-size); line-height: var(--ads-body-line); overflow: hidden; }
button, input, select, textarea, table { font-family: var(--font-family-ui); }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .audit-item:focus-visible, .check-head:focus-visible, .photo-add:focus-visible { outline: var(--ui-border-width-strong) solid var(--ads-border-focused); outline-offset: var(--space-025); }

/* Layout */

#topbar-inner { display: flex; align-items: center; gap: var(--space-150); padding: var(--space-150) var(--space-200); min-height: var(--ui-topbar-height); }
#topbar h1 { font-size: var(--ads-heading-small-size); line-height: var(--ads-heading-small-line); font-weight: var(--ads-weight-semibold); flex: 1; letter-spacing: -0.01em; }
#topbar .tag { display: inline-flex; align-items: center; min-height: var(--ui-lozenge-height); padding-inline: var(--ui-lozenge-padding-inline); border-radius: var(--radius-small); background: var(--ads-information-bg); color: var(--ads-information-text); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-semibold); letter-spacing: 0.02em; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom, 0); }
#tabbar { background: var(--ads-surface); border-top: var(--ui-border-width) solid var(--ads-border); display: flex; padding: var(--space-100) var(--space-0) calc(var(--space-100) + env(safe-area-inset-bottom, 0)); flex-shrink: 0; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-025); min-height: var(--ui-tabbar-height); border: 0; background: transparent; color: var(--ads-text-subtlest); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, color 150ms ease; }
.tab-btn:hover { background: var(--ads-surface-container); color: var(--ads-text); }
.tab-btn.active { color: var(--ads-brand); }
.tab-btn svg { width: var(--space-300); height: var(--space-300); }

/* Sections & surfaces */
.section-header { padding: var(--space-200) var(--space-200) var(--space-100); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-semibold); letter-spacing: 0.04em; text-transform: uppercase; color: var(--ads-text-subtlest); }
.card, .check-card, .audit-item, .stat-card { background: var(--ads-surface); border: var(--ui-border-width) solid var(--ads-border); border-radius: var(--radius-large); overflow: hidden; }
.card { margin: var(--space-0) var(--space-150) var(--space-100); }
.card-row { display: flex; align-items: center; padding: var(--space-200); gap: var(--space-150); border-bottom: var(--ui-border-width) solid var(--ads-border); }
.card-row:last-child { border-bottom: 0; }
.card-row .label { flex: 1; font-size: var(--ads-body-size); line-height: var(--ads-body-line); color: var(--ads-text); }
.card-row .sub { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); margin-top: var(--space-025); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-075); min-height: var(--touch-target-min); padding-inline: var(--ui-button-padding-inline); border: var(--ui-border-width) solid transparent; border-radius: var(--radius-medium); background: var(--ads-surface-container); color: var(--ads-text); font-size: var(--ads-body-size); line-height: var(--ads-body-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, border-color 150ms ease, transform 100ms ease; -webkit-user-select: none; user-select: none; }
.btn:hover { background: var(--ads-surface-container-hovered); }
.btn:active { transform: scale(0.98); }
.btn-primary, .btn-teal { background: var(--ads-brand); border-color: var(--ads-brand); color: var(--ads-text-inverse); }
.btn-primary:hover, .btn-teal:hover { background: var(--ads-brand-hovered); border-color: var(--ads-brand-hovered); }
.btn-primary:active, .btn-teal:active { background: var(--ads-brand-pressed); border-color: var(--ads-brand-pressed); }
.btn-ghost { background: var(--ads-surface-container); border-color: transparent; color: var(--ads-text); }
.btn-danger { background: var(--ads-danger); border-color: var(--ads-danger); color: var(--ads-text-inverse); }
.btn-sm { min-height: var(--ui-button-small-height); padding-inline: var(--ui-button-small-padding-inline); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); }
.btn-full { width: 100%; border-radius: var(--radius-large); }

/* Form controls */
input[type=text], input[type=date], input[type=number], textarea, select { background: var(--ads-surface); border: var(--ui-border-width) solid var(--ads-border-input); border-radius: var(--radius-medium); color: var(--ads-text); font-size: var(--ads-body-size); line-height: var(--ads-body-line); min-height: var(--ui-field-height); padding: var(--space-100) var(--space-150); width: 100%; outline: none; transition: border-color 150ms ease, box-shadow 150ms ease; -webkit-appearance: none; }
input:focus, textarea:focus, select:focus { border-color: var(--ads-border-focused); box-shadow: 0 0 0 var(--ui-border-width) var(--ads-border-focused); }
textarea { resize: vertical; min-height: var(--space-800); }
select option { background: var(--ads-surface); color: var(--ads-text); }

/* Lozenge / Badge */
.badge, .lozenge, .dDay { display: inline-flex; align-items: center; justify-content: center; width: max-content; max-width: 100%; min-height: var(--ui-lozenge-height); padding-inline: var(--ui-lozenge-padding-inline); border-radius: var(--radius-small); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-medium); white-space: nowrap; border: var(--ui-border-width) solid transparent; }
.badge-ok { background: var(--ads-success-bg); color: var(--ads-success-text); border-color: var(--ads-success-bold); }
.badge-ng { background: var(--ads-danger-bg); color: var(--ads-danger-text); border-color: var(--ads-danger); }
.badge-na { background: var(--ads-neutral-bg); color: var(--ads-neutral-text); border-color: var(--ads-neutral-bold); }
.badge-obs { background: var(--ads-warning-bg); color: var(--ads-warning-text); border-color: var(--ads-warning-bold); }

/* Answer buttons */
.ans-row { display: flex; gap: var(--space-100); flex-wrap: wrap; }
.ans-btn { flex: 1; min-width: var(--space-800); min-height: var(--ui-button-small-height); border: var(--ui-border-width) solid var(--ads-border-input); background: var(--ads-surface); color: var(--ads-text-subtle); border-radius: var(--radius-medium); padding-inline: var(--space-100); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-medium); cursor: pointer; transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease; text-align: center; }
.ans-btn:hover { background: var(--ads-surface-container); }
.ans-btn.sel-ok { background: var(--ads-success-bg); border-color: var(--ads-success-bold); color: var(--ads-success-text); }
.ans-btn.sel-ng { background: var(--ads-danger-bg); border-color: var(--ads-danger); color: var(--ads-danger-text); }
.ans-btn.sel-na { background: var(--ads-neutral-bg); border-color: var(--ads-neutral-bold); color: var(--ads-neutral-text); }
.ans-btn.sel-obs { background: var(--ads-warning-bg); border-color: var(--ads-warning-bold); color: var(--ads-warning-text); }

/* Progress */
.prog-wrap { height: var(--ui-progress-height); background: var(--ads-surface-container); border-radius: var(--radius-full); overflow: hidden; margin: var(--space-0) var(--space-150) var(--space-050); }
.prog-fill { height: 100%; background: var(--ads-brand); border-radius: var(--radius-full); transition: width 300ms ease; }
.prog-label { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); padding: var(--space-0) var(--space-150) var(--space-150); display: flex; justify-content: space-between; }

/* Check item */
.check-card { margin: var(--space-0) var(--space-150) var(--space-150); }
.check-card.answered { border-color: var(--ads-border-bold); }
.check-head { padding: var(--space-200) var(--space-200) var(--space-150); cursor: pointer; }
.check-num { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-brand); font-weight: var(--ads-weight-semibold); margin-bottom: var(--space-050); letter-spacing: 0.02em; }
.check-q { font-size: var(--ads-body-size); line-height: var(--ads-body-line); font-weight: var(--ads-weight-medium); color: var(--ads-text); }
.check-ref { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); margin-top: var(--space-050); }
.check-body { padding: var(--space-150) var(--space-200) var(--space-200); border-top: var(--ui-border-width) solid var(--ads-border); }
.check-body.hidden { display: none; }
.check-label { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtle); font-weight: var(--ads-weight-medium); margin-bottom: var(--space-075); margin-top: var(--space-150); }
.check-label:first-child { margin-top: var(--space-0); }

/* Photos */
.photo-row { display: flex; gap: var(--space-100); flex-wrap: wrap; margin-top: var(--space-050); }
.photo-thumb, .photo-add { width: var(--ui-photo-size); height: var(--ui-photo-size); border-radius: var(--radius-medium); }
.photo-thumb { object-fit: cover; border: var(--ui-border-width) solid var(--ads-border); cursor: pointer; }
.photo-add { border: var(--ui-border-width-strong) dashed var(--ads-border-bold); background: var(--ads-surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-050); cursor: pointer; color: var(--ads-text-subtlest); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); }
.photo-add:hover { background: var(--ads-surface-container); color: var(--ads-text); }
.photo-add svg { width: var(--space-300); height: var(--space-300); }
.photo-remove { position: absolute; top: calc(-1 * var(--space-075)); right: calc(-1 * var(--space-075)); width: 1.125rem; height: 1.125rem; border-radius: var(--radius-full); background: var(--ads-danger); border: 0; color: var(--ads-text-inverse); font-size: var(--ads-body-small-size); cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(9, 30, 66, 0.54); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 200ms ease; }
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal-sheet { background: var(--ads-surface-overlay); border-radius: var(--radius-xxlarge) var(--radius-xxlarge) var(--space-0) var(--space-0); width: 100%; max-height: 90vh; overflow-y: auto; padding: var(--space-0) var(--space-0) env(safe-area-inset-bottom, var(--space-200)); transform: translateY(100%); transition: transform 250ms cubic-bezier(.4, 0, .2, 1); box-shadow: var(--shadow-overlay); }
.modal-backdrop.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: var(--space-400); height: var(--space-050); background: var(--ads-border-bold); border-radius: var(--radius-full); margin: var(--space-150) auto var(--space-200); }
.modal-title { font-size: var(--ads-heading-small-size); line-height: var(--ads-heading-small-line); font-weight: var(--ads-weight-semibold); padding: var(--space-0) var(--space-250) var(--space-200); border-bottom: var(--ui-border-width) solid var(--ads-border); color: var(--ads-text); }
.modal-body { padding: var(--space-200) var(--space-250); }
.modal-actions { position: sticky; bottom: 0; display: flex; gap: var(--space-150); padding: var(--space-200) var(--space-250) calc(var(--space-200) + env(safe-area-inset-bottom, 0)); border-top: var(--ui-border-width) solid var(--ads-border); background: var(--ads-surface-overlay); }

/* Upload */
.upload-zone { border: var(--ui-border-width-strong) dashed var(--ads-border-bold); border-radius: var(--radius-large); padding: var(--space-500) var(--space-250); text-align: center; cursor: pointer; transition: border-color 200ms ease, background-color 200ms ease; margin: var(--space-0) var(--space-150); background: var(--ads-surface); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--ads-border-focused); background: var(--ads-information-bg); }
.upload-zone svg { width: var(--space-500); height: var(--space-500); color: var(--ads-text-subtlest); margin-bottom: var(--space-150); }
.upload-zone h3 { font-size: var(--ads-body-size); line-height: var(--ads-body-line); font-weight: var(--ads-weight-semibold); margin-bottom: var(--space-075); }
.upload-zone p { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-100); padding: var(--space-0) var(--space-150); }
.stat-card { padding: var(--space-200); text-align: center; }
.stat-val { font-size: var(--ads-heading-large-size); line-height: var(--ads-heading-large-line); font-weight: var(--ads-weight-bold); color: var(--ads-brand); }
.stat-lbl { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); margin-top: var(--space-050); }
.stat-ok .stat-val { color: var(--ads-success-text); }
.stat-ng .stat-val { color: var(--ads-danger-text); }
.stat-na .stat-val { color: var(--ads-neutral-text); }
.stat-obs .stat-val { color: var(--ads-warning-text); }

/* Toast */
#toast { position: fixed; bottom: calc(var(--space-800) + env(safe-area-inset-bottom, 0)); left: 50%; transform: translateX(-50%) translateY(var(--space-100)); background: var(--ads-surface-overlay); border: var(--ui-border-width) solid var(--ads-border-bold); border-radius: var(--radius-full); padding: var(--space-100) var(--space-250); font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); font-weight: var(--ads-weight-medium); white-space: nowrap; opacity: 0; transition: opacity 200ms ease, transform 200ms ease; z-index: 300; pointer-events: none; box-shadow: var(--shadow-overlay); color: var(--ads-text); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.divider { height: var(--ui-border-width); background: var(--ads-border); margin: var(--space-100) var(--space-0); }
.empty { padding: var(--space-800) var(--space-300); text-align: center; }
.empty svg { width: var(--space-600); height: var(--space-600); color: var(--ads-text-subtlest); margin-bottom: var(--space-200); }
.empty h3 { font-size: var(--ads-heading-small-size); line-height: var(--ads-heading-small-line); font-weight: var(--ads-weight-semibold); margin-bottom: var(--space-100); }
.empty p { font-size: var(--ads-body-size); line-height: var(--ads-body-line); color: var(--ads-text-subtlest); }

/* Audit list */
.audit-item { margin: var(--space-0) var(--space-150) var(--space-100); padding: var(--space-200); cursor: pointer; transition: background-color 150ms ease, border-color 150ms ease; }

.audit-item-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-075); }
.audit-item-title { font-size: var(--ads-body-size); line-height: var(--ads-body-line); font-weight: var(--ads-weight-semibold); }
.audit-item-meta { font-size: var(--ads-body-small-size); line-height: var(--ads-body-small-line); color: var(--ads-text-subtlest); display: flex; gap: var(--space-150); flex-wrap: wrap; }
.audit-item-meta span { display: flex; align-items: center; gap: var(--space-050); }
.status-dot { width: var(--space-075); height: var(--space-075); border-radius: var(--radius-full); flex-shrink: 0; }
.dot-progress { background: var(--ads-warning-text); }
.dot-done { background: var(--ads-success-text); }
.dot-new { background: var(--ads-brand); }

/* Utility classes for refactored inline style reduction */

<script>
// ═══════════════════════════════════════════════
//  DB (IndexedDB via simple wrapper)
// ═══════════════════════════════════════════════
const DB_NAME = 'AuditApp', DB_VER = 2;
let db;

function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains('templates'))
        d.createObjectStore('templates',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('audits'))
        d.createObjectStore('audits',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess = e=>{ db=e.target.result; res(db); };
    req.onerror = e=>rej(e);
  });
}

function dbAll(store){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbGet(store,id){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(id);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbPut(store,obj){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).put(obj);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbDelete(store,id){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).delete(id);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}

function dbClear(store){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).clear();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let currentTab = 'home';
let currentAudit = null;
let currentPhotoTarget = null; // {auditId, itemIndex}
let pendingPhotos = [];
let checklistSyncState = { checked: false, reachable: null, message: '점검표 서버 확인 전' };

// 관리자 모드
// - 일반 사용자는 GitHub에서 동기화된 공식 점검표로 심사만 수행한다.
// - 관리자는 URL에 ?admin=1을 붙여 점검표 업로드/삭제 등 관리 기능을 표시한다.
const ADMIN_MODE_STORAGE_KEY = 'auditAppAdminMode';

function initAdminModeFromUrl(){
  const params = new URLSearchParams(location.search);
  if(params.get('admin') === '1') localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  if(params.get('admin') === '0') localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
}

function isAdminMode(){
  return localStorage.getItem(ADMIN_MODE_STORAGE_KEY) === '1';
}

function setAdminMode(enabled){
  if(enabled) localStorage.setItem(ADMIN_MODE_STORAGE_KEY, '1');
  else localStorage.removeItem(ADMIN_MODE_STORAGE_KEY);
  showToast(enabled ? '관리자 모드가 켜졌습니다' : '관리자 모드가 꺼졌습니다');
  switchTab(currentTab);
}

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
initAdminModeFromUrl();

openDB().then(()=>{
  updateOnlineTag();
  window.addEventListener('online', updateOnlineTag);
  window.addEventListener('offline', updateOnlineTag);
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden) updateOnlineTag();
  });
  repairStoredTemplates()
    .catch(e => console.warn('기존 점검표 호환 보정 실패:', e))
    .then(() => autoLoadChecklists())
    .catch(e => console.warn('자동 점검표 로드 실패:', e))
    .finally(()=> switchTab('home'));
}).catch(e=>{
  console.error('DB 초기화 실패:', e);
  document.getElementById('content').innerHTML = '<div class="empty"><h3>앱 초기화 실패</h3><p>브라우저 저장소 접근을 확인한 뒤 다시 실행하세요.</p></div>';
});


// ═══════════════════════════════════════════════
//  Template compatibility / migration helpers
//  - 기존 기기에 저장된 과거 점검표 데이터를 삭제하지 않고 새 구조로 보정한다.
// ═══════════════════════════════════════════════
function normalizeChecklistItem(item){
  if(!item || typeof item !== 'object') return null;

  const question = String(
    item.question ?? item.title ?? item.name ?? item.item ?? item.checkItem ?? item['점검 질문'] ?? item['점검항목'] ?? ''
  ).trim();
  if(!question) return null;

  return {
    section: String(item.section ?? item.category ?? item.group ?? item['섹션명'] ?? item['섹션'] ?? '일반').trim() || '일반',
    ref: String(item.ref ?? item.no ?? item.number ?? item.code ?? item['항목번호'] ?? '').trim(),
    question,
    refStd: String(item.refStd ?? item.standard ?? item.reference ?? item.regulation ?? item['참조규정'] ?? '').trim(),
    type: String(item.type ?? item.answerType ?? item['점검유형'] ?? 'OK/NG/NA/OBS').trim() || 'OK/NG/NA/OBS',
    result: item.result ?? null,
    note: String(item.note ?? item.memo ?? item.comment ?? item['비고'] ?? ''),
    photos: Array.isArray(item.photos) ? item.photos : []
  };
}

function normalizeTemplate(template){
  const t = template && typeof template === 'object' ? template : {};
  let rawItems = [];

  if(Array.isArray(t.items)) rawItems = t.items;
  else if(Array.isArray(t.questions)) rawItems = t.questions;
  else if(Array.isArray(t.rows)) rawItems = t.rows;
  else if(Array.isArray(t.checklist)) rawItems = t.checklist;

  const items = rawItems.map(normalizeChecklistItem).filter(Boolean);
  const sectionSource = Array.isArray(t.sections) && t.sections.length
    ? t.sections
    : [...new Set(items.map(i => i.section || '일반'))];

  return {
    ...t,
    name: String(t.name || t.title || t.filename || '이름 없는 점검표').trim(),
    version: String(t.version || '').trim(),
    source: t.source || (t.filename ? 'preset' : 'manual'),
    active: t.active !== false,
    sha: String(t.sha || '').trim(),
    updatedAt: String(t.updatedAt || '').trim(),
    fingerprint: String(t.fingerprint || '').trim(),
    templateKey: t.templateKey || (t.filename && t.version ? `${t.filename}@@${t.version}` : ''),
    sections: sectionSource.map(s => String(s || '일반').trim()).filter(Boolean),
    items
  };
}

async function getNormalizedTemplates(){
  const templates = await dbAll('templates');
  return templates.map(normalizeTemplate);
}

async function getNormalizedTemplate(id){
  const template = await dbGet('templates', id);
  return template ? normalizeTemplate(template) : null;
}

async function repairStoredTemplates(){
  const templates = await dbAll('templates');
  let repaired = 0;

  for(const original of templates){
    const normalized = normalizeTemplate(original);
    const originalCount = Array.isArray(original?.items) ? original.items.length : 0;
    const needsRepair = !Array.isArray(original?.items)
      || originalCount !== normalized.items.length
      || !Array.isArray(original?.sections)
      || !original?.name;

    if(needsRepair && normalized.id && normalized.items.length){
      await dbPut('templates', normalized);
      repaired += 1;
    }
  }

  if(repaired > 0) console.log(`점검표 호환 보정 완료: ${repaired}건`);
  return repaired;
}

// ═══════════════════════════════════════════════
//  자동 점검표 동기화 (GitHub Contents API 폴더 스캔 기준)
//  - 관리자는 GitHub checklists 폴더에 Excel을 추가/교체한다.
//  - 앱은 GitHub Contents API로 checklists 폴더를 조회한다.
//  - .xlsx/.xls 파일만 자동 동기화한다.
//  - GitHub SHA를 기준으로 변경된 파일만 IndexedDB에 반영한다.
//  - 기존 심사 데이터는 수정하지 않고, 새 심사부터 최신 점검표를 사용한다.
// ═══════════════════════════════════════════════
const CHECKLIST_FOLDER_PATH = 'checklists';
const GITHUB_BRANCH = 'main';
const GITHUB_API_BASE = 'https://api.github.com';

function getChecklistDisplayName(filename){
  return String(filename || '')
    .split('/')
    .pop()
    .replace(/\.(xlsx|xls)$/i, '')
    .replace(/[_-]+/g, ' ')
    .trim() || '이름 없는 점검표';
}

function getGitHubRepoInfo(){
  const host = location.hostname;
  const pathParts = location.pathname.split('/').filter(Boolean);

  if(host.endsWith('.github.io') && pathParts.length > 0){
    return {
      owner: host.replace('.github.io', ''),
      repo: pathParts[0],
      branch: GITHUB_BRANCH
    };
  }

  // 로컬 테스트 또는 커스텀 도메인에서는 아래 값을 필요 시 직접 수정한다.
  return {
    owner: 'tt170019-bot',
    repo: 'audit-app',
    branch: GITHUB_BRANCH
  };
}

function normalizeGitHubChecklistItem(item){
  if(!item || typeof item !== 'object') return null;
  if(item.type !== 'file') return null;
  if(!/\.(xlsx|xls)$/i.test(item.name || '')) return null;
  if(String(item.name || '').startsWith('~$')) return null;

  const filename = String(item.name || '').trim();
  const sha = String(item.sha || '').trim();
  const downloadUrl = String(item.download_url || '').trim();

  if(!filename || !downloadUrl) return null;

  return {
    filename,
    path: downloadUrl,
    name: getChecklistDisplayName(filename),
    sha,
    updatedAt: '',
    fingerprint: sha || filename,
    enabled: true
  };
}

async function loadChecklistIndex(){
  const repo = getGitHubRepoInfo();
  const apiUrl = `${GITHUB_API_BASE}/repos/${encodeURIComponent(repo.owner)}/${encodeURIComponent(repo.repo)}/contents/${CHECKLIST_FOLDER_PATH}?ref=${encodeURIComponent(repo.branch)}&ts=${Date.now()}`;

  try{
    const res = await fetch(apiUrl, {
      cache: 'no-store',
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    if(!res.ok) throw new Error(`GitHub Contents API HTTP ${res.status}`);

    const data = await res.json();
    checklistSyncState = { checked: true, reachable: true, message: 'GitHub 점검표 서버 접근 가능' };
    const rawList = Array.isArray(data) ? data : [];
    return rawList
      .map(normalizeGitHubChecklistItem)
      .filter(Boolean)
      .sort((a,b)=>a.filename.localeCompare(b.filename, 'ko'));
  } catch(e){
    checklistSyncState = { checked: true, reachable: false, message: '온라인 상태와 별개로 GitHub 점검표 서버 접근 실패' };
    console.warn('GitHub checklists 폴더 조회 실패. 저장된 점검표를 계속 사용합니다.', e);
    return [];
  }
}

function getPresetTemplateKey(cl){
  return `${cl.filename}@@${cl.fingerprint || cl.sha || cl.updatedAt || 'unversioned'}`;
}

function getTemplateVersionLabel(template){
  if(template?.sha) return `SHA ${String(template.sha).slice(0, 7)}`;
  if(template?.updatedAt) return `수정 ${new Date(template.updatedAt).toLocaleDateString('ko-KR')}`;
  if(template?.version) return `v${template.version}`;
  if(template?.importedAt) return `등록 ${new Date(template.importedAt).toLocaleDateString('ko-KR')}`;
  return 'legacy';
}

function getTemplateSourceLabel(template){
  if((template?.source === 'github-api' || template?.source === 'github-index')) return '자동동기화';
  if(template?.source === 'preset') return '자동등록';
  return '수동등록';
}

function sortTemplatesForDisplay(templates){
  return [...templates].sort((a,b)=>{
    const activeA = a.active === false ? 1 : 0;
    const activeB = b.active === false ? 1 : 0;
    if(activeA !== activeB) return activeA - activeB;
    const ai = String(a.importedAt || '');
    const bi = String(b.importedAt || '');
    if(ai !== bi) return bi.localeCompare(ai);
    return String(a.name || '').localeCompare(String(b.name || ''), 'ko');
  });
}

function extractChecklistItemsFromRows(rows){
  const items = [];
  const sections = new Set();

  for(let i=1;i<rows.length;i++){
    const [section,ref,question,refStd,type] = rows[i];
    if(!question) continue;
    const normalized = normalizeChecklistItem({
      section: section || '일반',
      ref,
      question,
      refStd,
      type: type || 'OK/NG/NA/OBS'
    });
    if(!normalized) continue;
    sections.add(normalized.section || '일반');
    items.push(normalized);
  }

  return { items, sections: [...sections] };
}

async function markSupersededTemplates(filename, keepTemplateKey, indexFilenames){
  const existing = await dbAll('templates');
  for(const t of existing){
    if(t.source !== 'github-api' && t.source !== 'github-index' && t.source !== 'preset') continue;
    if(filename && t.filename === filename && t.templateKey !== keepTemplateKey && t.active !== false){
      await dbPut('templates', {...t, active:false, supersededAt:new Date().toISOString()});
    }
    if(!filename && indexFilenames && t.filename && !indexFilenames.has(t.filename) && t.active !== false){
      await dbPut('templates', {...t, active:false, removedFromIndexAt:new Date().toISOString()});
    }
  }
}

async function autoLoadChecklists(){
  const index = await loadChecklistIndex();
  let added = 0;
  let updated = 0;

  if(index.length === 0){
    console.log('동기화할 GitHub 점검표가 없습니다. checklists 폴더를 확인하세요.');
    return 0;
  }

  const indexFilenames = new Set(index.map(cl => cl.filename));
  await markSupersededTemplates(null, null, indexFilenames);

  for(const cl of index){
    const existing = await dbAll('templates');
    const templateKey = getPresetTemplateKey(cl);
    const sameVersion = existing.find(t => t.templateKey === templateKey || (t.filename === cl.filename && t.fingerprint === cl.fingerprint));
    if(sameVersion){
      if(sameVersion.active === false){
        await dbPut('templates', {...sameVersion, active:true, restoredAt:new Date().toISOString()});
      }
      continue;
    }

    try{
      const res = await fetch(`${cl.path}?sha=${encodeURIComponent(cl.fingerprint)}&ts=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) throw new Error(`${cl.path} HTTP ${res.status}`);

      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const parsed = extractChecklistItemsFromRows(rows);
      if(parsed.items.length===0) throw new Error('점검 항목을 찾을 수 없습니다. Excel 컬럼 형식을 확인하세요.');

      await markSupersededTemplates(cl.filename, templateKey, null);
      await dbPut('templates', {
        name: cl.name,
        filename: cl.filename,
        sha: cl.sha || '',
        updatedAt: cl.updatedAt || '',
        fingerprint: cl.fingerprint,
        templateKey,
        source: 'github-api',
        active: true,
        importedAt: new Date().toISOString(),
        sections: parsed.sections,
        items: parsed.items
      });
      added += 1;
      updated += existing.some(t => t.filename === cl.filename) ? 1 : 0;
      console.log(`✅ 점검표 동기화: ${cl.name} ${cl.sha ? cl.sha.slice(0, 7) : cl.updatedAt || ''}`);
    } catch(e){
      console.warn(`점검표 동기화 실패: ${cl.filename}`, e);
    }
  }

  if(added > 0){
    showToast(updated > 0 ? `점검표 ${updated}건 업데이트됨` : `점검표 ${added}건 동기화됨`);
    if(currentTab === 'templates'){
      const c = document.getElementById('content');
      if(c) renderTemplates(c);
    }
  }
  return added;
}

function updateOnlineTag(){
  const tag = document.getElementById('offline-tag');
  if(!tag) return Promise.resolve(false);
  const pingUrl = `./index.html?online-check=${Date.now()}`;

  return fetch(pingUrl, { method:'HEAD', cache:'no-store' })
    .then(() => {
      tag.textContent = 'ONLINE';
      tag.classList.add('is-online');
      tag.classList.remove('is-offline');
      return true;
    })
    .catch(() => {
      tag.textContent = 'OFFLINE';
      tag.classList.add('is-offline');
      tag.classList.remove('is-online');
      return false;
    });
}

function switchTab(tab){

    b.classList.toggle('active', b.dataset.tab===tab);

  const action = document.getElementById('topbar-action');
  action.style.display='none';

  renderTab(tab);
}

async function renderTab(tab){
  const c = document.getElementById('content');
  document.getElementById('topbar-title').textContent = '심사 점검표';
  if(tab==='home') await renderHome(c);
  else if(tab==='audits') await renderAudits(c);
  else if(tab==='templates') await renderTemplates(c);
  else if(tab==='export') await renderExport(c);
}

function toggleCheckItem(idx){
  const body = document.getElementById('cb-'+idx);
  if(!body) return;
  body.classList.toggle('hidden');
}

async function setResult(auditId, idx, result){
  const audit = await dbGet('audits', auditId);
  if(!audit) return;
  const wasAnswered = !!audit.items[idx].result;
  audit.items[idx].result = result;
  currentAudit = audit;
  await dbPut('audits', audit);

  renderChecklist(audit);
  const body = document.getElementById('cb-'+idx);
  if(body) body.classList.remove('hidden');
  const card = document.getElementById('ci-'+idx);
  if(card) card.scrollIntoView({behavior:'smooth', block:'center'});

  if(!wasAnswered && result) showToast('저장되었습니다');
}

async function setNote(auditId, idx, note){
  const audit = await dbGet('audits', auditId);
  if(!audit) return;
  audit.items[idx].note = note;
  currentAudit = audit;
  await dbPut('audits', audit);
}

function jumpToNext(auditId){
  const items = currentAudit?.items||[];
  const nextIdx = items.findIndex(i=>!i.result);
  if(nextIdx<0){ showToast('모든 항목이 완료되었습니다 ✓'); return; }
  const el = document.getElementById('ci-'+nextIdx);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'center'});
    // open it
    const body = document.getElementById('cb-'+nextIdx);
    if(body) body.classList.remove('hidden');
  }
}

async function finishAudit(id){
  const audit = await dbGet('audits', id);
  if(!audit) return;
  const unanswered = audit.items?.filter(i=>!i.result).length||0;
  if(unanswered>0){
    if(!confirm(`아직 ${unanswered}개 항목이 미완료입니다. 완료로 표시하시겠습니까?`)) return;
  }
  audit.status='done';
  await dbPut('audits', audit);
  showToast('심사가 완료되었습니다');
  backFromChecklist();
}

  document.getElementById('topbar').style.display='block';
  document.getElementById('tabbar').style.display='flex';
  document.getElementById('topbar-action').style.display='none';
  currentAudit=null;

// ═══════════════════════════════════════════════
//  Excel Import
// ═══════════════════════════════════════════════
function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone')?.classList.remove('drag');
  const file = e.dataTransfer?.files[0];
  if(file) handleFileSelect(file);
}

function handleFileSelect(file){
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls'].includes(ext)){ showToast('Excel 파일(.xlsx)만 지원합니다'); return; }

  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // Skip header row
      const items=[], sections=new Set();
      for(let i=1;i<rows.length;i++){
        const [section,ref,question,refStd,type] = rows[i];
        if(!question) continue;
        sections.add(section||'일반');
        items.push({
          section: section||'일반',
          ref: String(ref||'').trim(),
          question: String(question).trim(),
          refStd: String(refStd||'').trim(),
          type: String(type||'OK/NG/NA/OBS').trim()
        });
      }
      if(items.length===0){ showToast('항목을 찾을 수 없습니다. 형식을 확인하세요'); return; }

      const importedAt = new Date().toISOString();
      const tpl = {
        name: file.name.replace(/\.[^.]+$/,''),
        filename: file.name,
        version: file.lastModified ? new Date(file.lastModified).toISOString().slice(0,10) : importedAt.slice(0,10),
        source: 'manual',
        templateKey: `${file.name}@@manual@@${importedAt}`,
        importedAt,
        sections: [...sections],
        items
      };
      dbPut('templates', tpl).then(()=>{
        showToast(`${items.length}개 항목 가져오기 완료`);
        switchTab('templates');
      });
    } catch(err){
      showToast('파일을 읽을 수 없습니다: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload=e=>{
    // Resize to max 800px for storage
    const img = new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhotos.push(canvas.toDataURL('image/jpeg',0.75));
      renderPhotoPreview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function savePhoto(){
  if(!currentPhotoTarget) return;
  const {auditId, itemIdx} = currentPhotoTarget;
  const audit = await dbGet('audits', auditId);
  if(!audit) return;
  audit.items[itemIdx].photos = [...pendingPhotos];
  currentAudit = audit;
  await dbPut('audits', audit);
  // Refresh photos in UI
  const area = document.getElementById('photos-'+itemIdx);
  if(area){
    area.innerHTML = pendingPhotos.map(p=>`<img class="photo-thumb photo-thumb-clickable" src="${p}" onclick="viewPhoto('${p}')" alt="사진">`).join('')+
      `<div class="photo-add" onclick="openPhotoModal(${auditId},${itemIdx})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="4"/><path d="M5 7H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V9a2 2 0 00-2-2h-2l-2-3H9L7 7z"/></svg>
        <span>추가</span>
      </div>`;
  }
  closeModal('modal-photo');
  showToast(`사진 ${pendingPhotos.length}장 저장됨`);
}

function viewPhoto(src){
  const d=document.createElement('div');
  d.className = 'viewer';
  d.innerHTML=`<img src="${src}" alt="첨부 사진 확대"><button class="viewer-close" onclick="this.parentNode.remove()" aria-label="닫기">✕</button>`;
  document.body.appendChild(d);
}

// ═══════════════════════════════════════════════
async function exportExcel(id){
  const audit = await dbGet('audits', id);
  if(!audit){ showToast('심사를 불러올 수 없습니다'); return; }

  const wb = XLSX.utils.book_new();

  // Summary sheet
  const ok=audit.items.filter(i=>i.result==='OK').length;
  const ng=audit.items.filter(i=>i.result==='NG').length;
  const na=audit.items.filter(i=>i.result==='NA').length;
  const obs=audit.items.filter(i=>i.result==='OBS').length;
  const total=audit.items.length;

  const sumData=[
    ['심사 요약'],
    [],
    ['심사명', audit.title],
    ['심사일', audit.date],
    ['심사원', audit.auditor],
    ['피심사 부서', audit.dept],
    ['작성일', new Date().toLocaleDateString('ko-KR')],
    [],
    ['구분','건수','비율'],
    ['OK (적합)', ok, total?Math.round(ok/total*100)+'%':''],
    ['NG (부적합)', ng, total?Math.round(ng/total*100)+'%':''],
    ['NA (해당없음)', na, total?Math.round(na/total*100)+'%':''],
    ['OBS (관찰사항)', obs, total?Math.round(obs/total*100)+'%':''],
    ['합계', total, '100%'],
  ];
  const wsSum = XLSX.utils.aoa_to_sheet(sumData);
  wsSum['!cols']=[{wch:20},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsSum, '요약');

  // Detail sheet
  const detailData=[['섹션','항목번호','점검 항목','참조규정','결과','비고']];
  audit.items.forEach(item=>{
    detailData.push([item.section||'',item.ref||'',item.question||'',item.refStd||'',item.result||'',item.note||'']);
  });
  const wsDetail = XLSX.utils.aoa_to_sheet(detailData);
  wsDetail['!cols']=[{wch:16},{wch:12},{wch:50},{wch:20},{wch:8},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsDetail, '점검결과');

  // NG sheet
  const ngItems = audit.items.filter(i=>i.result==='NG');
  if(ngItems.length>0){
    const ngData=[['섹션','항목번호','부적합 내용','세부사항']];
    ngItems.forEach(item=>{
      ngData.push([item.section||'',item.ref||'',item.question||'',item.note||'']);
    });
    const wsNG = XLSX.utils.aoa_to_sheet(ngData);
    wsNG['!cols']=[{wch:16},{wch:12},{wch:50},{wch:40}];
    XLSX.utils.book_append_sheet(wb, wsNG, '부적합사항');
  }

  const fname = `${audit.title}_${audit.date||'결과'}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast('Excel 파일 저장됨');
}

function openModal(id){
  document.getElementById(id).classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}
// Close modal on backdrop tap
document.querySelectorAll('.modal-backdrop').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) closeModal(m.id); });
});
window.addEventListener('popstate', () => {
  if(currentAudit) backFromChecklist();
});

// ═══════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════
let _toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Service Worker registration
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const base = location.pathname.replace(/\/[^\/]*$/, '/');
    navigator.serviceWorker.register(base + 'sw.js', {scope: base})
      .then(reg => {
        console.log('SW registered:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if(!worker) return;
          worker.addEventListener('statechange', () => {
            if(worker.state === 'installed' && navigator.serviceWorker.controller){
              showToast('새 버전이 준비되었습니다. 새로고침하면 적용됩니다.');
            }
          });
        });
      })
      .catch(e => console.warn('SW error:', e));
  });
}
